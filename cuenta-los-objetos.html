<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light">
  <title>Cuenta los objetos</title>
  <style>
    :root {
      --ink: #33424c;
      --paper: #effaff;
      --card: #ffffff;
      --blue: #2989cb;
      --blue-dark: #17649b;
      --yellow: #ffd45d;
      --green: #46bd78;
      --red: #e96268;
      --shadow: #c7dce5;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; min-height: 100%; }

    body {
      min-height: 100dvh;
      overflow-x: hidden;
      color: var(--ink);
      font-family: ui-rounded, "SF Pro Rounded", system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(circle at 8% 14%, #fff2a1 0 4%, transparent 4.5%),
        radial-gradient(circle at 92% 12%, #cceeff 0 6%, transparent 6.5%),
        linear-gradient(145deg, #f3fcff, #fff9e8);
      user-select: none;
      -webkit-user-select: none;
    }

    button { font: inherit; touch-action: manipulation; }

    .screen {
      min-height: 100dvh;
      padding: max(18px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right))
        max(18px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    }

    .start {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      text-align: center;
      background: linear-gradient(145deg, #eafaff, #fff7d7);
      transition: opacity .25s ease, visibility .25s ease;
    }

    .start.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .start-content { width: min(560px, 100%); }
    .hero { font-size: clamp(96px, 25vw, 155px); line-height: 1; }
    h1 { margin: 12px 0 7px; font-size: clamp(33px, 8vw, 52px); line-height: 1.03; }
    .start p { margin: 0 0 27px; color: #687983; font-size: clamp(18px, 4.5vw, 25px); font-weight: 750; }

    .play {
      min-width: min(330px, 84vw);
      min-height: 88px;
      padding: 16px 26px;
      border: 0;
      border-radius: 29px;
      color: white;
      background: var(--blue);
      box-shadow: 0 9px 0 var(--blue-dark);
      font-size: clamp(25px, 6vw, 34px);
      font-weight: 950;
      cursor: pointer;
    }

    .play:active { transform: translateY(6px); box-shadow: 0 3px 0 var(--blue-dark); }

    .game {
      width: min(850px, 100%);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      gap: clamp(9px, 2vh, 18px);
    }

    .topbar { display: grid; grid-template-columns: 56px 1fr 56px; gap: 10px; align-items: center; }
    .progress { display: flex; justify-content: center; gap: clamp(3px, 1vw, 8px); }
    .progress-dot { width: clamp(10px, 2.7vw, 18px); aspect-ratio: 1; border-radius: 50%; background: #cee0e8; }
    .progress-dot.done { background: var(--yellow); box-shadow: inset 0 -3px 0 #dcae30; }

    .icon-button {
      width: 54px;
      height: 54px;
      border: 0;
      border-radius: 17px;
      background: white;
      box-shadow: 0 5px 0 var(--shadow);
      font-size: 26px;
      cursor: pointer;
    }

    .icon-button:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--shadow); }
    .prompt { display: flex; align-items: center; justify-content: center; gap: 10px; text-align: center; }
    .friend { font-size: clamp(46px, 11vw, 69px); line-height: 1; }
    .prompt h2 { margin: 0; font-size: clamp(25px, 6vw, 39px); }

    .object-card {
      flex: 1 1 280px;
      min-height: 230px;
      display: grid;
      place-items: center;
      padding: clamp(18px, 4vw, 34px);
      border-radius: 34px;
      background: rgba(255,255,255,.82);
      box-shadow: inset 0 0 0 3px rgba(41,137,203,.1), 0 8px 0 rgba(199,220,229,.8);
    }

    .objects {
      width: min(640px, 100%);
      display: grid;
      grid-template-columns: repeat(var(--columns), minmax(0, 1fr));
      align-items: center;
      justify-items: center;
      gap: clamp(8px, 2.2vw, 20px);
    }

    .object {
      font-size: clamp(48px, var(--object-size), 92px);
      line-height: 1;
      filter: drop-shadow(0 4px 1px rgba(61,78,87,.12));
      animation: appear .35s backwards;
      animation-delay: calc(var(--index) * 45ms);
    }

    .answers { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(10px, 3vw, 22px); }
    .answer {
      min-height: clamp(94px, 17vh, 145px);
      border: 0;
      border-radius: clamp(20px, 4vw, 30px);
      color: var(--ink);
      background: var(--card);
      box-shadow: 0 8px 0 var(--shadow);
      font-size: clamp(51px, 14vw, 89px);
      font-weight: 1000;
      cursor: pointer;
      transition: transform .1s ease;
    }

    .answer:active { transform: translateY(5px); box-shadow: 0 3px 0 var(--shadow); }
    .answer.correct { outline: 7px solid var(--green); animation: pop .42s ease; }
    .answer.wrong { outline: 7px solid var(--red); animation: wobble .4s ease; }
    .answer:disabled { cursor: default; }

    .message { min-height: 40px; text-align: center; font-size: clamp(22px, 5vw, 33px); font-weight: 950; }
    .message.good { color: #237748; }
    .message.try { color: #a63d46; }

    .finish {
      position: fixed;
      inset: 0;
      z-index: 15;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      background: rgba(242,251,255,.97);
    }

    .finish[hidden] { display: none; }
    .finish .hero { animation: float 1.7s ease-in-out infinite; }
    .finish h2 { margin: 12px 0 7px; font-size: clamp(36px, 9vw, 57px); }
    .finish p { margin: 0 0 25px; font-size: clamp(20px, 5vw, 28px); font-weight: 750; }

    @keyframes appear { from { opacity: 0; transform: scale(.45) rotate(-8deg); } }
    @keyframes pop { 50% { transform: scale(1.1) rotate(2deg); } }
    @keyframes wobble { 25% { transform: translateX(-8px); } 50% { transform: translateX(8px); } 75% { transform: translateX(-5px); } }
    @keyframes float { 50% { transform: translateY(-10px); } }

    @media (max-width: 430px) {
      .screen { padding-top: max(10px, env(safe-area-inset-top)); padding-bottom: max(10px, env(safe-area-inset-bottom)); }
      .game { gap: 7px; }
      .topbar { grid-template-columns: 48px 1fr 48px; }
      .icon-button { width: 47px; height: 47px; border-radius: 14px; font-size: 22px; }
      .object-card { min-height: 220px; border-radius: 25px; padding: 14px; }
      .answer { min-height: 92px; box-shadow: 0 6px 0 var(--shadow); }
      .message { min-height: 34px; }
    }

    @media (orientation: landscape) and (max-height: 560px) {
      .screen { padding-top: max(7px, env(safe-area-inset-top)); padding-bottom: max(7px, env(safe-area-inset-bottom)); }
      .game { gap: 5px; }
      .friend { font-size: 37px; }
      .prompt h2 { font-size: 23px; }
      .object-card { width: min(680px, 82%); min-height: 140px; flex-basis: 140px; align-self: center; padding: 8px 18px; }
      .object { font-size: clamp(36px, 11vh, 62px); }
      .answers { width: min(580px, 72%); align-self: center; }
      .answer { min-height: 75px; font-size: clamp(40px, 13vh, 68px); }
      .message { min-height: 27px; font-size: 22px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <section class="start screen" id="startScreen" aria-labelledby="gameTitle">
    <div class="start-content">
      <div class="hero" aria-hidden="true">🐙</div>
      <h1 id="gameTitle">Cuenta los objetos</h1>
      <p>Cuenta despacio y elige el número</p>
      <button class="play" id="playButton" type="button">▶️ &nbsp;Jugar</button>
    </div>
  </section>

  <main class="game screen">
    <header class="topbar">
      <button class="icon-button" id="homeButton" type="button" aria-label="Volver al inicio">🏠</button>
      <div class="progress" id="progress" aria-label="Progreso"></div>
      <button class="icon-button" id="speakButton" type="button" aria-label="Repetir la pregunta">🔊</button>
    </header>

    <section class="prompt">
      <div class="friend" aria-hidden="true">🐙</div>
      <h2>¿Cuántos hay?</h2>
    </section>

    <section class="object-card" aria-label="Objetos para contar">
      <div class="objects" id="objects"></div>
    </section>

    <section class="answers" id="answers" aria-label="Elige un número"></section>
    <div class="message" id="message" role="status" aria-live="polite"></div>
  </main>

  <section class="finish" id="finish" hidden aria-labelledby="finishTitle">
    <div>
      <div class="hero" aria-hidden="true">🌟</div>
      <h2 id="finishTitle">¡Fantástico!</h2>
      <p>¡Ya sabes contar hasta diez!</p>
      <button class="play" id="againButton" type="button">🔄 &nbsp;Otra vez</button>
    </div>
  </section>

  <script>
    "use strict";

    const TOTAL_ROUNDS = 10;
    const OBJECTS = ["🍓", "🐞", "🚗", "⭐", "🐟", "🍎", "🦋", "🌼", "⚽", "🧸"];
    const NUMBER_WORDS = ["cero", "uno", "dos", "tres", "cuatro", "cinco", "seis", "siete", "ocho", "nueve", "diez"];
    const ENGLISH_NUMBER_WORDS = ["zero", "one", "two", "three", "four", "five", "six", "seven", "eight", "nine", "ten"];
    const CHINESE_NUMERALS = ["零", "一", "二", "三", "四", "五", "六", "七", "八", "九", "十"];

    const startScreen = document.getElementById("startScreen");
    const finishScreen = document.getElementById("finish");
    const objectsElement = document.getElementById("objects");
    const answersElement = document.getElementById("answers");
    const progressElement = document.getElementById("progress");
    const messageElement = document.getElementById("message");

    let round = 0;
    let answerNumber = 1;
    let sessionActive = false;
    let locked = false;
    let nextTimer = 0;
    let audioContext = null;

    function shuffle(items) {
      const result = items.slice();
      for (let index = result.length - 1; index > 0; index -= 1) {
        const other = Math.floor(Math.random() * (index + 1));
        [result[index], result[other]] = [result[other], result[index]];
      }
      return result;
    }

    function renderProgress() {
      progressElement.replaceChildren();
      for (let index = 0; index < TOTAL_ROUNDS; index += 1) {
        const dot = document.createElement("span");
        dot.className = "progress-dot" + (index < round ? " done" : "");
        dot.setAttribute("aria-hidden", "true");
        progressElement.appendChild(dot);
      }
      progressElement.setAttribute("aria-label", `Ronda ${Math.min(round + 1, TOTAL_ROUNDS)} de ${TOTAL_ROUNDS}`);
    }

    function makeOptions(number) {
      const options = new Set([number]);
      const nearby = shuffle([number - 1, number + 1, number - 2, number + 2, number - 3, number + 3]);
      nearby.forEach((candidate) => {
        if (candidate >= 1 && candidate <= 10 && options.size < 3) options.add(candidate);
      });
      return shuffle(Array.from(options));
    }

    function visibleNumber(number) {
      return window.__gameLang === "zh" ? CHINESE_NUMERALS[number] : String(number);
    }

    function accessibleNumber(number) {
      if (window.__gameLang === "zh") return CHINESE_NUMERALS[number];
      if (window.__gameLang === "en") return ENGLISH_NUMBER_WORDS[number];
      return NUMBER_WORDS[number];
    }

    function buildRound() {
      if (!sessionActive) return;
      locked = false;
      answerNumber = round + 1;
      messageElement.textContent = "";
      messageElement.className = "message";
      renderProgress();

      const symbol = OBJECTS[round % OBJECTS.length];
      const columns = answerNumber <= 3 ? answerNumber : answerNumber <= 6 ? 3 : 5;
      const responsiveSize = answerNumber <= 4 ? "17vw" : answerNumber <= 6 ? "13vw" : "10vw";
      objectsElement.style.setProperty("--columns", String(columns));
      objectsElement.style.setProperty("--object-size", responsiveSize);
      objectsElement.replaceChildren();

      for (let index = 0; index < answerNumber; index += 1) {
        const item = document.createElement("span");
        item.className = "object";
        item.textContent = symbol;
        item.style.setProperty("--index", String(index));
        item.setAttribute("aria-hidden", "true");
        objectsElement.appendChild(item);
      }
      objectsElement.setAttribute("aria-label", `${answerNumber} objetos`);

      answersElement.replaceChildren();
      makeOptions(answerNumber).forEach((number) => {
        const button = document.createElement("button");
        button.className = "answer";
        button.type = "button";
        button.textContent = visibleNumber(number);
        button.dataset.number = String(number);
        button.setAttribute("aria-label", accessibleNumber(number));
        button.addEventListener("click", checkAnswer);
        answersElement.appendChild(button);
      });
    }

    function ensureAudioContext() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return null;
      if (!audioContext) audioContext = new AudioContextClass();
      if (audioContext.state === "suspended") audioContext.resume().catch(() => {});
      return audioContext;
    }

    function playTones(frequencies) {
      const context = ensureAudioContext();
      if (!context) return;
      const start = context.currentTime;
      frequencies.forEach((frequency, index) => {
        const oscillator = context.createOscillator();
        const gain = context.createGain();
        oscillator.type = "sine";
        oscillator.frequency.value = frequency;
        gain.gain.setValueAtTime(.0001, start + index * .12);
        gain.gain.exponentialRampToValueAtTime(.15, start + index * .12 + .02);
        gain.gain.exponentialRampToValueAtTime(.0001, start + index * .12 + .11);
        oscillator.connect(gain).connect(context.destination);
        oscillator.start(start + index * .12);
        oscillator.stop(start + index * .12 + .12);
      });
    }

    function speak(text) {
      if (!sessionActive || !("speechSynthesis" in window) || !("SpeechSynthesisUtterance" in window)) return;
      if (typeof window.__kidsSpeak === "function") {
        window.__kidsSpeak(text, .88, 1.1);
        return;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = window.__gameLang === "zh" ? "zh-CN" : window.__gameLang === "en" ? "en-US" : "es-ES";
      utterance.rate = .88;
      utterance.pitch = 1.1;
      window.speechSynthesis.speak(utterance);
    }

    function checkAnswer(event) {
      if (locked || !sessionActive) return;
      const button = event.currentTarget;
      const chosen = Number(button.dataset.number);

      if (chosen !== answerNumber) {
        button.classList.remove("wrong");
        void button.offsetWidth;
        button.classList.add("wrong");
        messageElement.textContent = "Cuenta otra vez…";
        messageElement.className = "message try";
        playTones([240, 195]);
        speak("Cuenta otra vez, despacio.");
        return;
      }

      locked = true;
      button.classList.add("correct");
      answersElement.querySelectorAll("button").forEach((item) => { item.disabled = true; });
      messageElement.textContent = window.__gameLang === "zh"
        ? `对，有${CHINESE_NUMERALS[answerNumber]}个！⭐`
        : `¡Sí, hay ${answerNumber}! ⭐`;
      messageElement.className = "message good";
      playTones([523, 659, 784]);
      speak(`¡Muy bien! Hay ${NUMBER_WORDS[answerNumber]}.`);
      round += 1;
      renderProgress();

      nextTimer = window.setTimeout(() => {
        if (!sessionActive) return;
        if (round >= TOTAL_ROUNDS) showFinish();
        else buildRound();
      }, 1350);
    }

    function beginGame() {
      window.clearTimeout(nextTimer);
      sessionActive = true;
      locked = false;
      round = 0;
      finishScreen.hidden = true;
      startScreen.classList.add("hidden");
      ensureAudioContext();
      buildRound();
      // Safari conserva mejor el permiso de voz si se habla dentro del toque que inicia el juego.
      speak("¿Cuántos hay? Cuenta y elige el número.");
    }

    function showFinish() {
      sessionActive = false;
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      finishScreen.hidden = false;
      playTones([523, 659, 784, 1046]);
    }

    function goHome() {
      sessionActive = false;
      locked = true;
      window.clearTimeout(nextTimer);
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      finishScreen.hidden = true;
      startScreen.classList.remove("hidden");
    }

    document.getElementById("playButton").addEventListener("click", beginGame);
    document.getElementById("againButton").addEventListener("click", beginGame);
    document.getElementById("homeButton").addEventListener("click", goHome);
    document.getElementById("speakButton").addEventListener("click", () => speak("¿Cuántos hay? Cuenta y elige el número."));
    document.addEventListener("visibilitychange", () => {
      if (document.hidden && "speechSynthesis" in window) window.speechSynthesis.cancel();
    });

    renderProgress();
  </script>

function translateAttributes(element){for(const a of ['aria-label','title','placeholder'])if(element.hasAttribute(a)){const v=tx(element.getAttribute(a));if(v!==element.getAttribute(a))element.setAttribute(a,v)}}
function translateNode(node){if(node.nodeType===3){if(!/^(SCRIPT|STYLE)$/.test(node.parentElement?.tagName||'')){const v=tx(node.nodeValue);if(v!==node.nodeValue)node.nodeValue=v}}else if(node.nodeType===1){translateAttributes(node);node.querySelectorAll?.('*').forEach(translateAttributes);const w=document.createTreeWalker(node,NodeFilter.SHOW_TEXT);while(w.nextNode())translateNode(w.currentNode)}}
if(lang!=='es'){document.title=tx(document.title);translateNode(document.body);}
function syncInactiveScreens(){document.querySelectorAll('[data-kids-inactive]').forEach(el=>{if(!el.matches('.screen.hide,.screen.hidden,.overlay.hide,.overlay.hidden')){el.inert=false;el.removeAttribute('aria-hidden');delete el.dataset.kidsInactive}});document.querySelectorAll('.screen.hide,.screen.hidden,.overlay.hide,.overlay.hidden').forEach(el=>{el.inert=true;el.setAttribute('aria-hidden','true');el.dataset.kidsInactive='true'})}
syncInactiveScreens();new MutationObserver(syncInactiveScreens).observe(document.body,{subtree:true,attributes:true,attributeFilter:['class']});
const observer=new MutationObserver(list=>{if(lang==='es')return;for(const change of list){if(change.type==='characterData')translateNode(change.target);else if(change.type==='attributes')translateNode(change.target);else change.addedNodes.forEach(translateNode)}});observer.observe(document.body,{subtree:true,childList:true,characterData:true,attributes:true,attributeFilter:['aria-label','title','placeholder']});
function wrap(name){const base=window[name];if(typeof base==='function'&&!base.__translated){const fn=function(text,...rest){return base(tx(text),...rest)};fn.__translated=true;window[name]=fn}}
wrap('speak');wrap('safeSpeak');
const box=document.createElement('div');box.className='kids-lang-switch';box.setAttribute('aria-label',lang==='es'?'Idioma':lang==='en'?'Language':'语言');[['es','ES'],['en','EN'],['zh','中文']].forEach(([code,label])=>{const b=document.createElement('button');b.type='button';b.textContent=label;b.setAttribute('aria-pressed',String(code===lang));b.setAttribute('aria-label',code==='es'?'Español':code==='en'?'English':'中文');b.onclick=()=>{try{localStorage.setItem('kidsGameLanguage',code)}catch(_){}const url=new URL(location.href);url.searchParams.set('lang',code);location.href=url.href};box.appendChild(b)});document.body.appendChild(box);
})();
