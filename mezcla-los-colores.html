<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#fff8df">
<title>Mezcla los colores</title>
<style>
:root{--ink:#3d392e;--paper:#fff8df;--card:#fff;--yellow:#f0c94d;--shadow:#ded0a7;--focus:#075ec5;--good:#16864b}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;font-family:ui-rounded,"SF Pro Rounded",system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--paper)}body{min-height:100dvh;padding:calc(12px + env(safe-area-inset-top)) max(12px,env(safe-area-inset-right)) calc(18px + env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left));background:radial-gradient(circle at 92% 8%,#bdeaff 0 8%,transparent 9%),linear-gradient(145deg,#fffdf4,#fff2ba)}button,a{font:inherit}.top{display:flex;align-items:center;justify-content:space-between;gap:10px;width:min(760px,100%);margin:auto}.icon-button{display:grid;place-items:center;width:52px;height:52px;border:0;border-radius:17px;background:#fff;color:var(--ink);box-shadow:0 5px 0 var(--shadow);font-size:25px;text-decoration:none;cursor:pointer}.progress{font-size:17px;font-weight:900}.language{display:flex;justify-content:center;gap:4px;margin:10px auto 0}.language button{min-width:45px;min-height:38px;border:0;border-radius:13px;background:#fff;color:var(--ink);font-weight:850}.language button[aria-pressed=true]{background:#e3ad27;color:#332800}main{width:min(760px,100%);margin:8px auto 0;text-align:center}h1{margin:4px 0;font-size:clamp(28px,6vw,43px)}.instruction{margin:0;color:#72684d;font-size:clamp(16px,3vw,20px);font-weight:750}.mix{display:flex;align-items:center;justify-content:center;gap:clamp(10px,4vw,25px);min-height:210px;margin:16px auto;padding:20px;border-radius:34px;background:#fff;box-shadow:0 8px 0 var(--shadow)}.blob{display:grid;place-items:center;width:clamp(82px,20vw,135px);aspect-ratio:1;border:4px solid rgba(0,0,0,.11);border-radius:50% 43% 48% 42%;box-shadow:inset 8px 9px 0 rgba(255,255,255,.22);transform:rotate(-5deg)}.blob.two{border-radius:43% 50% 42% 48%;transform:rotate(7deg)}.symbol{font-size:clamp(38px,9vw,65px);font-weight:950}.question{display:grid;place-items:center;width:clamp(70px,16vw,105px);aspect-ratio:1;border:5px dashed #b9a871;border-radius:50%;color:#8b7d51;font-size:clamp(40px,9vw,65px);font-weight:950}.choices{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:13px}.choice{min-height:125px;padding:9px;border:4px solid transparent;border-radius:25px;background:#fff;box-shadow:0 7px 0 var(--shadow);cursor:pointer}.swatch{display:block;width:62px;height:62px;margin:auto;border:3px solid rgba(0,0,0,.14);border-radius:50%}.color-name{display:block;margin-top:6px;font-size:17px;font-weight:900}.choice.correct{border-color:var(--good);background:#eafff1}.choice.wrong{border-color:#e97760}.feedback{min-height:34px;margin:15px 0 0;font-size:clamp(18px,4vw,24px);font-weight:950}.finish{display:none;margin:35px auto 0;padding:28px;border-radius:32px;background:#fff;box-shadow:0 8px 0 var(--shadow)}.finish.show{display:block}.finish .star{font-size:84px}.again{min-height:58px;margin-top:16px;padding:10px 25px;border:0;border-radius:19px;background:#73d296;color:#173e24;box-shadow:0 6px 0 #43a363;font-size:20px;font-weight:900;cursor:pointer}:focus-visible{outline:5px solid var(--focus);outline-offset:4px}@media(max-width:480px){.mix{min-height:160px;margin:10px auto;padding:14px;gap:9px}.choices{gap:8px}.choice{min-height:108px;padding:7px 3px}.swatch{width:52px;height:52px}.color-name{font-size:14px}}@media(max-height:500px) and (orientation:landscape){.language{position:fixed;right:max(8px,env(safe-area-inset-right));top:max(8px,env(safe-area-inset-top));z-index:4}.mix{min-height:110px;margin:7px auto;padding:8px}.blob{width:75px}.question{width:62px}.choices{grid-template-columns:repeat(3,1fr)}.choice{min-height:90px}.swatch{width:43px;height:43px}h1{font-size:26px}}@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<nav class="top" id="top"><a class="icon-button" id="home" href="index.html">🏠</a><div class="progress" id="progress"></div><button class="icon-button" id="speak" type="button">🔊</button></nav>
<div class="language" id="language"><button data-lang="es" aria-label="Español">ES</button><button data-lang="en" aria-label="English">EN</button><button data-lang="zh" aria-label="中文">中文</button></div>
<main><section id="game"><h1 id="title"></h1><p class="instruction" id="instruction"></p><div class="mix" id="mix"><div class="blob" id="colorA"></div><span class="symbol" aria-hidden="true">+</span><div class="blob two" id="colorB"></div><span class="symbol" aria-hidden="true">=</span><div class="question" aria-hidden="true">?</div></div><div class="choices" id="choices"></div><div class="feedback" id="feedback" role="status" aria-live="polite"></div></section><section class="finish" id="finish"><div class="star" aria-hidden="true">🎨🌟</div><h1 id="finishTitle"></h1><p class="instruction" id="finishText"></p><button class="again" id="again" type="button"></button></section></main>
<script>
"use strict";
const TEXT={es:{title:"Mezcla los colores",instruction:"¿Qué color aparece al mezclarlos?",progress:(a,b)=>`Mezcla ${a} de ${b}`,mix:(a,b)=>`Mezclar ${a} y ${b}`,options:"Elige el color que aparece",right:c=>`¡Sí, aparece ${c}! ⭐`,wrong:"Casi… prueba otro color",finish:"¡Artista de colores!",finishText:"Has completado todas las mezclas",again:"Mezclar otra vez ↻",home:"Volver al inicio",speak:"Repetir la pregunta",controls:"Controles",language:"Idioma"},en:{title:"Mix the colors",instruction:"Which color appears when we mix them?",progress:(a,b)=>`Mix ${a} of ${b}`,mix:(a,b)=>`Mix ${a} and ${b}`,options:"Choose the color that appears",right:c=>`Yes, it makes ${c}! ⭐`,wrong:"Almost… try another color",finish:"Color artist!",finishText:"You completed every color mix",again:"Mix again ↻",home:"Back to home",speak:"Repeat the question",controls:"Controls",language:"Language"},zh:{title:"混合颜色",instruction:"把它们混在一起会变成什么颜色？",progress:(a,b)=>`第 ${a} / ${b} 次混色`,mix:(a,b)=>`混合${a}和${b}`,options:"选择混合后的颜色",right:c=>`对啦，变成${c}！⭐`,wrong:"差一点……试试其他颜色",finish:"颜色小画家！",finishText:"你完成了所有颜色混合",again:"再混一次 ↻",home:"返回首页",speak:"重复问题",controls:"控制",language:"语言"}};
const COLORS={red:{hex:"#e84f4f",name:["rojo","red","红色"]},yellow:{hex:"#f3cf3f",name:["amarillo","yellow","黄色"]},blue:{hex:"#438be5",name:["azul","blue","蓝色"]},white:{hex:"#fff",name:["blanco","white","白色"]},black:{hex:"#343434",name:["negro","black","黑色"]},orange:{hex:"#f39432",name:["naranja","orange","橙色"]},green:{hex:"#51ad62",name:["verde","green","绿色"]},purple:{hex:"#955ab7",name:["morado","purple","紫色"]},pink:{hex:"#f29ab2",name:["rosa","pink","粉色"]},lightblue:{hex:"#91d6ef",name:["azul claro","light blue","浅蓝色"]},gray:{hex:"#979797",name:["gris","gray","灰色"]}};
const ROUNDS=[['red','yellow','orange',['green','purple']],['yellow','blue','green',['orange','purple']],['blue','red','purple',['green','orange']],['red','white','pink',['orange','purple']],['blue','white','lightblue',['gray','green']],['black','white','gray',['lightblue','purple']]];
const el=Object.fromEntries(["top","home","progress","speak","language","game","title","instruction","mix","colorA","colorB","choices","feedback","finish","finishTitle","finishText","again"].map(id=>[id,document.getElementById(id)]));let lang="es",round=0,order=[],locked=false;try{const q=new URLSearchParams(location.search).get("lang"),s=localStorage.getItem("kidsGameLanguage"),x=q||s;if(TEXT[x])lang=x}catch(_){const q=new URLSearchParams(location.search).get("lang");if(TEXT[q])lang=q}const t=()=>TEXT[lang],li=()=>lang==="en"?1:lang==="zh"?2:0,shuffle=a=>{for(let i=a.length-1;i;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};
function speak(text){if(!("speechSynthesis" in window)||!("SpeechSynthesisUtterance" in window))return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang=lang==="zh"?"zh-CN":lang==="en"?"en-US":"es-ES";u.rate=.82;window.speechSynthesis.speak(u)}
function applyText(){document.documentElement.lang=lang==="zh"?"zh-Hans":lang;document.title=t().title;el.title.textContent=t().title;el.instruction.textContent=t().instruction;el.home.href=`index.html?lang=${lang}`;el.home.setAttribute("aria-label",t().home);el.speak.setAttribute("aria-label",t().speak);el.top.setAttribute("aria-label",t().controls);el.language.setAttribute("aria-label",t().language);el.choices.setAttribute("aria-label",t().options);el.finishTitle.textContent=t().finish;el.finishText.textContent=t().finishText;el.again.textContent=t().again;document.querySelectorAll("[data-lang]").forEach(b=>b.setAttribute("aria-pressed",String(b.dataset.lang===lang)))}
function start(){round=0;order=shuffle([...ROUNDS]);el.finish.classList.remove("show");el.game.hidden=false;showRound()}
function showRound(){locked=false;el.feedback.textContent="";const [a,b,result,wrong]=order[round],ca=COLORS[a],cb=COLORS[b];el.progress.textContent=t().progress(round+1,ROUNDS.length);el.colorA.style.background=ca.hex;el.colorB.style.background=cb.hex;el.mix.setAttribute("aria-label",t().mix(ca.name[li()],cb.name[li()]));const keys=shuffle([result,...wrong]);el.choices.replaceChildren(...keys.map(key=>{const c=COLORS[key],button=document.createElement("button");button.type="button";button.className="choice";button.setAttribute("aria-label",c.name[li()]);button.innerHTML=`<span class="swatch" style="background:${c.hex}" aria-hidden="true"></span><span class="color-name">${c.name[li()]}</span>`;button.onclick=()=>choose(button,key,result);return button}))}
function choose(button,key,result){if(locked)return;if(key===result){locked=true;button.classList.add("correct");el.feedback.textContent=t().right(COLORS[result].name[li()]);speak(el.feedback.textContent);setTimeout(()=>{round++;if(round<ROUNDS.length)showRound();else complete()},700)}else{button.classList.add("wrong");setTimeout(()=>button.classList.remove("wrong"),450);el.feedback.textContent=t().wrong;speak(t().wrong)}}function complete(){el.game.hidden=true;el.finish.classList.add("show");el.progress.textContent=`${ROUNDS.length} / ${ROUNDS.length}`;speak(`${t().finish} ${t().finishText}`)}
el.speak.onclick=()=>{const [a,b]=order[round]||ROUNDS[0];speak(`${t().instruction} ${t().mix(COLORS[a].name[li()],COLORS[b].name[li()])}`)};el.again.onclick=start;el.language.onclick=e=>{const b=e.target.closest("[data-lang]");if(!b)return;lang=b.dataset.lang;try{localStorage.setItem("kidsGameLanguage",lang)}catch(_){}const u=new URL(location.href);u.searchParams.set("lang",lang);history.replaceState(null,"",u);applyText();if(!el.game.hidden)showRound()};applyText();start();
</script>
</body>
</html>
