<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#fff0f5">
<title>Memoria de parejas</title>
<style>
:root{--ink:#493342;--paper:#fff0f5;--card:#fff;--pink:#ef78a6;--shadow:#ddbcca;--focus:#075ec5;--good:#42a969}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;font-family:ui-rounded,"SF Pro Rounded",system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--paper)}body{min-height:100dvh;padding:calc(12px + env(safe-area-inset-top)) max(12px,env(safe-area-inset-right)) calc(18px + env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left));background:radial-gradient(circle at 90% 6%,#ffe388 0 7%,transparent 8%),linear-gradient(145deg,#fff8fb,#ffe5ef)}button,a{font:inherit}.top{display:flex;align-items:center;justify-content:space-between;gap:10px;width:min(650px,100%);margin:auto}.icon-button{display:grid;place-items:center;width:52px;height:52px;border:0;border-radius:17px;background:#fff;color:var(--ink);box-shadow:0 5px 0 var(--shadow);font-size:25px;text-decoration:none;cursor:pointer}.progress{font-size:17px;font-weight:900}.language{display:flex;justify-content:center;gap:4px;margin:10px auto 0}.language button{min-width:45px;min-height:38px;border:0;border-radius:13px;background:#fff;color:var(--ink);font-weight:850}.language button[aria-pressed=true]{background:var(--pink);color:#fff}main{width:min(650px,100%);margin:8px auto 0;text-align:center}h1{margin:4px 0;font-size:clamp(28px,6vw,43px)}.instruction{margin:0 0 14px;color:#765a6c;font-size:clamp(16px,3vw,20px);font-weight:750}.board{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:clamp(8px,2.5vw,15px);perspective:900px}.card{position:relative;min-height:128px;padding:0;border:0;border-radius:25px;background:transparent;cursor:pointer;transform-style:preserve-3d;transition:transform .36s}.card.flipped,.card.matched{transform:rotateY(180deg)}.face{position:absolute;inset:0;display:grid;place-items:center;border-radius:25px;backface-visibility:hidden;-webkit-backface-visibility:hidden;box-shadow:0 7px 0 var(--shadow)}.back{background:linear-gradient(145deg,#ef78a6,#d95089);color:#fff;font-size:50px;font-weight:950}.front{transform:rotateY(180deg);background:#fff;font-size:62px;border:4px solid transparent}.matched .front{border-color:var(--good);background:#eafff1}.feedback{min-height:34px;margin:14px 0 0;font-size:clamp(18px,4vw,24px);font-weight:950}.finish{display:none;margin:28px auto 0;padding:28px;border-radius:32px;background:#fff;box-shadow:0 8px 0 var(--shadow)}.finish.show{display:block}.finish .star{font-size:84px}.again{min-height:58px;margin-top:16px;padding:10px 25px;border:0;border-radius:19px;background:#74d092;color:#173e24;box-shadow:0 6px 0 #43a363;font-size:20px;font-weight:900;cursor:pointer}:focus-visible{outline:5px solid var(--focus);outline-offset:4px}@media(max-width:480px){.board{grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.card{min-height:101px}.face{border-radius:19px}.front{font-size:45px}.back{font-size:40px}}@media(max-width:340px){.card{min-height:88px}.front{font-size:39px}}@media(max-height:500px) and (orientation:landscape){.language{position:fixed;right:max(8px,env(safe-area-inset-right));top:max(8px,env(safe-area-inset-top));z-index:4}.card{min-height:90px}.front{font-size:44px}h1{font-size:26px}.instruction{margin-bottom:8px}}@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<nav class="top" id="top"><a class="icon-button" id="home" href="index.html">🏠</a><div class="progress" id="progress"></div><button class="icon-button" id="speak" type="button">🔊</button></nav>
<div class="language" id="language"><button data-lang="es" aria-label="Español">ES</button><button data-lang="en" aria-label="English">EN</button><button data-lang="zh" aria-label="中文">中文</button></div>
<main><section id="game"><h1 id="title"></h1><p class="instruction" id="instruction"></p><div class="board" id="board"></div><div class="feedback" id="feedback" role="status" aria-live="polite"></div></section><section class="finish" id="finish"><div class="star" aria-hidden="true">🌟</div><h1 id="finishTitle"></h1><p class="instruction" id="finishText"></p><button class="again" id="again" type="button"></button></section></main>
<script>
"use strict";
const TEXT={es:{title:"Memoria de parejas",instruction:"Toca dos cartas y encuentra las parejas",progress:(a,b)=>`${a} de ${b} parejas`,board:"Cartas de memoria",hidden:"Carta boca abajo",right:"¡Pareja encontrada! ⭐",try:"Recuerda dónde están y prueba otra vez",finish:"¡Qué buena memoria!",finishText:"Has encontrado todas las parejas",again:"Barajar otra vez ↻",home:"Volver al inicio",speak:"Repetir la instrucción",controls:"Controles",language:"Idioma"},en:{title:"Memory pairs",instruction:"Turn over two cards and find the pairs",progress:(a,b)=>`${a} of ${b} pairs`,board:"Memory cards",hidden:"Face-down card",right:"You found a pair! ⭐",try:"Remember where they are and try again",finish:"What a great memory!",finishText:"You found all the pairs",again:"Shuffle again ↻",home:"Back to home",speak:"Repeat the instruction",controls:"Controls",language:"Language"},zh:{title:"记忆配对",instruction:"翻开两张卡片，找出相同的一对",progress:(a,b)=>`已找到 ${a} / ${b} 对`,board:"记忆卡片",hidden:"背面朝上的卡片",right:"找到一对啦！⭐",try:"记住它们的位置，再试一次",finish:"记忆力真棒！",finishText:"你找到了所有配对",again:"重新洗牌 ↻",home:"返回首页",speak:"重复说明",controls:"控制",language:"语言"}};
const ITEMS=[{icon:"🐼",name:["panda","panda","熊猫"]},{icon:"🦁",name:["león","lion","狮子"]},{icon:"🐸",name:["rana","frog","青蛙"]},{icon:"🦋",name:["mariposa","butterfly","蝴蝶"]},{icon:"🚂",name:["tren","train","火车"]},{icon:"🍓",name:["fresa","strawberry","草莓"]},{icon:"🌈",name:["arcoíris","rainbow","彩虹"]},{icon:"🚀",name:["cohete","rocket","火箭"]}];const PAIRS=4;
const el=Object.fromEntries(["top","home","progress","speak","language","game","title","instruction","board","feedback","finish","finishTitle","finishText","again"].map(id=>[id,document.getElementById(id)]));let lang="es",first=null,second=null,locked=false,matched=0;try{const q=new URLSearchParams(location.search).get("lang"),s=localStorage.getItem("kidsGameLanguage"),x=q||s;if(TEXT[x])lang=x}catch(_){const q=new URLSearchParams(location.search).get("lang");if(TEXT[q])lang=q}const t=()=>TEXT[lang],li=()=>lang==="en"?1:lang==="zh"?2:0,shuffle=a=>{for(let i=a.length-1;i;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};
function speak(text){if(!("speechSynthesis" in window)||!("SpeechSynthesisUtterance" in window))return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang=lang==="zh"?"zh-CN":lang==="en"?"en-US":"es-ES";u.rate=.82;window.speechSynthesis.speak(u)}
function applyText(){document.documentElement.lang=lang==="zh"?"zh-Hans":lang;document.title=t().title;el.title.textContent=t().title;el.instruction.textContent=t().instruction;el.home.href=`index.html?lang=${lang}`;el.home.setAttribute("aria-label",t().home);el.speak.setAttribute("aria-label",t().speak);el.top.setAttribute("aria-label",t().controls);el.language.setAttribute("aria-label",t().language);el.board.setAttribute("aria-label",t().board);el.finishTitle.textContent=t().finish;el.finishText.textContent=t().finishText;el.again.textContent=t().again;el.progress.textContent=t().progress(matched,PAIRS);document.querySelectorAll("[data-lang]").forEach(b=>b.setAttribute("aria-pressed",String(b.dataset.lang===lang)));document.querySelectorAll(".card:not(.flipped):not(.matched)").forEach(b=>b.setAttribute("aria-label",t().hidden))}
function start(){first=second=null;locked=false;matched=0;el.feedback.textContent="";el.finish.classList.remove("show");el.game.hidden=false;const chosen=shuffle([...ITEMS]).slice(0,PAIRS),deck=shuffle(chosen.flatMap((item,i)=>[{item,pair:i},{item,pair:i}]));el.board.replaceChildren(...deck.map(data=>{const b=document.createElement("button");b.type="button";b.className="card";b.dataset.pair=data.pair;b.dataset.name=data.item.name[li()];b.setAttribute("aria-label",t().hidden);b.innerHTML=`<span class="face back" aria-hidden="true">?</span><span class="face front" aria-hidden="true">${data.item.icon}</span>`;b.onclick=()=>flip(b);return b}));applyText()}
function flip(card){if(locked||card===first||card.classList.contains("matched"))return;card.classList.add("flipped");card.setAttribute("aria-label",card.dataset.name);speak(card.dataset.name);if(!first){first=card;return}second=card;locked=true;if(first.dataset.pair===second.dataset.pair){setTimeout(()=>{first.classList.add("matched");second.classList.add("matched");matched++;el.progress.textContent=t().progress(matched,PAIRS);el.feedback.textContent=t().right;first=second=null;locked=false;if(matched===PAIRS)setTimeout(complete,500)},420)}else{el.feedback.textContent=t().try;setTimeout(()=>{first.classList.remove("flipped");second.classList.remove("flipped");first.setAttribute("aria-label",t().hidden);second.setAttribute("aria-label",t().hidden);first=second=null;locked=false},850)}}
function complete(){el.game.hidden=true;el.finish.classList.add("show");speak(`${t().finish} ${t().finishText}`)}
el.speak.onclick=()=>speak(t().instruction);el.again.onclick=start;el.language.onclick=e=>{const b=e.target.closest("[data-lang]");if(!b)return;lang=b.dataset.lang;try{localStorage.setItem("kidsGameLanguage",lang)}catch(_){}const u=new URL(location.href);u.searchParams.set("lang",lang);history.replaceState(null,"",u);start()};start();
</script>
</body>
</html>
