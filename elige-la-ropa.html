function load(){const r=ROUNDS[n];chosen.clear();locked=false;$('progress').textContent=`Ropa ${n+1} de ${ROUNDS.length}`;$('scene').textContent=r.scene;$('question').textContent=r.q;$('message').textContent='Elige 2 prendas';$('person').innerHTML='<span class="face">🧒</span>';$('next').classList.remove('show');$('choices').innerHTML='';shuffle([...r.good,...r.bad]).forEach(x=>{const b=document.createElement('button');b.className='cloth';b.textContent=x;b.setAttribute('aria-label',N[x]||'Prenda');b.onclick=()=>choose(x,b);$('choices').appendChild(b)});speak(r.say)}
function choose(x,b){if(locked||chosen.has(x))return;const r=ROUNDS[n];if(r.good.includes(x)){chosen.add(x);b.classList.add('selected');const w=document.createElement('span');w.className='worn';w.textContent=x;$('person').appendChild(w);$('message').textContent=`¡${chosen.size} de 2!`;speak('Muy bien');if(chosen.size===2)complete()}else{b.classList.remove('wrong');void b.offsetWidth;b.classList.add('wrong');$('message').textContent='Prueba otra prenda';speak('Prueba otra prenda')}}
