<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#e8f7e8">
<title>El semáforo</title>
<style>
:root{--ink:#263b2c;--paper:#e8f7e8;--card:#fff;--green:#59bd72;--shadow:#bad5bf;--focus:#075ec5}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;font-family:ui-rounded,"SF Pro Rounded",system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--paper)}body{min-height:100dvh;padding:calc(12px + env(safe-area-inset-top)) max(12px,env(safe-area-inset-right)) calc(18px + env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left));background:radial-gradient(circle at 10% 8%,#fff2a8 0 7%,transparent 8%),linear-gradient(145deg,#f7fff7,#dff4e2)}button,a{font:inherit}.top{display:flex;align-items:center;justify-content:space-between;gap:10px;width:min(760px,100%);margin:auto}.icon-button{display:grid;place-items:center;width:52px;height:52px;border:0;border-radius:17px;background:#fff;color:var(--ink);box-shadow:0 5px 0 var(--shadow);font-size:25px;text-decoration:none;cursor:pointer}.progress{font-size:17px;font-weight:900}.language{display:flex;justify-content:center;gap:4px;margin:10px auto 0}.language button{min-width:45px;min-height:38px;border:0;border-radius:13px;background:#fff;color:var(--ink);font-weight:850}.language button[aria-pressed=true]{background:var(--green);color:#12391e}main{width:min(760px,100%);margin:8px auto 0;text-align:center}h1{margin:4px 0;font-size:clamp(28px,6vw,43px)}.instruction{margin:0;color:#5c7563;font-size:clamp(16px,3vw,20px);font-weight:750}.scene{display:flex;align-items:center;justify-content:center;gap:clamp(25px,8vw,85px);min-height:265px;margin:14px auto;padding:17px;border-radius:34px;background:#fff;box-shadow:0 8px 0 var(--shadow)}.traffic{display:flex;flex-direction:column;gap:10px;padding:15px;border:7px solid #41464c;border-radius:34px;background:#24282c;box-shadow:0 11px 0 #adb9ad}.light{width:72px;height:72px;border-radius:50%;background:#555;box-shadow:inset 0 5px 10px #111;opacity:.25}.light.on{opacity:1;box-shadow:0 0 24px currentColor,inset 0 4px 7px rgba(255,255,255,.45)}.red{background:#f04f4f;color:#f04f4f}.yellow{background:#f1ca3c;color:#f1ca3c}.green{background:#52c96f;color:#52c96f}.traveler{font-size:clamp(85px,19vw,145px);line-height:1;filter:drop-shadow(0 7px 0 #d6e4d7)}.choices{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:13px}.choice{min-height:105px;padding:10px 5px;border:4px solid transparent;border-radius:25px;background:#fff;box-shadow:0 7px 0 var(--shadow);cursor:pointer}.choice .emoji{display:block;font-size:41px}.choice .label{display:block;margin-top:3px;font-size:clamp(17px,3vw,22px);font-weight:950}.choice.correct{border-color:#16864b;background:#eafff1}.choice.wrong{border-color:#e97760}.feedback{min-height:34px;margin:15px 0 0;font-size:clamp(18px,4vw,24px);font-weight:950}.finish{display:none;margin:35px auto 0;padding:28px;border-radius:32px;background:#fff;box-shadow:0 8px 0 var(--shadow)}.finish.show{display:block}.finish .star{font-size:84px}.again{min-height:58px;margin-top:16px;padding:10px 25px;border:0;border-radius:19px;background:#73d296;color:#173e24;box-shadow:0 6px 0 #43a363;font-size:20px;font-weight:900;cursor:pointer}:focus-visible{outline:5px solid var(--focus);outline-offset:4px}@media(max-width:480px){.scene{min-height:220px;margin:10px auto;gap:38px}.traffic{padding:11px;border-width:6px}.light{width:55px;height:55px}.choices{gap:8px}.choice{min-height:95px}.choice .emoji{font-size:34px}}@media(max-height:500px) and (orientation:landscape){.language{position:fixed;right:max(8px,env(safe-area-inset-right));top:max(8px,env(safe-area-inset-top));z-index:4}.scene{min-height:150px;margin:5px auto;padding:8px}.traffic{flex-direction:row;border-radius:25px}.light{width:55px;height:55px}.traveler{font-size:85px}.choice{min-height:80px}.choice .emoji{display:inline;font-size:29px}h1{font-size:26px}}@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<nav class="top" id="top"><a class="icon-button" id="home" href="index.html">🏠</a><div class="progress" id="progress"></div><button class="icon-button" id="speak" type="button">🔊</button></nav>
<div class="language" id="language"><button data-lang="es" aria-label="Español">ES</button><button data-lang="en" aria-label="English">EN</button><button data-lang="zh" aria-label="中文">中文</button></div>
<main><section id="game"><h1 id="title"></h1><p class="instruction" id="instruction"></p><div class="scene"><div class="traffic" id="traffic"><div class="light red" data-light="stop"></div><div class="light yellow" data-light="wait"></div><div class="light green" data-light="go"></div></div><div class="traveler" id="traveler" aria-hidden="true">🚙</div></div><div class="choices" id="choices"></div><div class="feedback" id="feedback" role="status" aria-live="polite"></div></section><section class="finish" id="finish"><div class="star" aria-hidden="true">🚦🌟</div><h1 id="finishTitle"></h1><p class="instruction" id="finishText"></p><button class="again" id="again" type="button"></button></section></main>
<script>
"use strict";
const TEXT={es:{title:"El semáforo",instruction:"Mira la luz. ¿Qué debemos hacer?",progress:(a,b)=>`Semáforo ${a} de ${b}`,signal:s=>`El semáforo está en ${s}`,options:"Elige qué debemos hacer",actions:{stop:["Parar","rojo"],wait:["Esperar","amarillo"],go:["Avanzar","verde"]},right:"¡Muy bien! Seguridad primero ⭐",wrong:"Mira la luz otra vez",finish:"¡Experto del semáforo!",finishText:"Sabes cuándo parar, esperar y avanzar",again:"Jugar otra vez ↻",home:"Volver al inicio",speak:"Repetir la pregunta",controls:"Controles",language:"Idioma"},en:{title:"Traffic lights",instruction:"Look at the light. What should we do?",progress:(a,b)=>`Traffic light ${a} of ${b}`,signal:s=>`The traffic light is ${s}`,options:"Choose what we should do",actions:{stop:["Stop","red"],wait:["Wait","yellow"],go:["Go","green"]},right:"Well done! Safety first ⭐",wrong:"Look at the light again",finish:"Traffic-light expert!",finishText:"You know when to stop, wait, and go",again:"Play again ↻",home:"Back to home",speak:"Repeat the question",controls:"Controls",language:"Language"},zh:{title:"交通信号灯",instruction:"看看信号灯。我们应该怎么做？",progress:(a,b)=>`第 ${a} / ${b} 个信号灯`,signal:s=>`信号灯是${s}`,options:"选择我们应该怎么做",actions:{stop:["停下来","红色"],wait:["等一等","黄色"],go:["向前走","绿色"]},right:"真棒！安全第一 ⭐",wrong:"再看看信号灯",finish:"信号灯小专家！",finishText:"你知道什么时候停、等和走",again:"再玩一次 ↻",home:"返回首页",speak:"重复问题",controls:"控制",language:"语言"}};
const ACTIONS={stop:{emoji:"✋"},wait:{emoji:"⏳"},go:{emoji:"➡️"}},TOTAL=9,TRAVELERS=["🚙","🚲","🛴","🚌"];
const el=Object.fromEntries(["top","home","progress","speak","language","game","title","instruction","traffic","traveler","choices","feedback","finish","finishTitle","finishText","again"].map(id=>[id,document.getElementById(id)]));let lang="es",round=0,sequence=[],locked=false;try{const q=new URLSearchParams(location.search).get("lang"),s=localStorage.getItem("kidsGameLanguage"),x=q||s;if(TEXT[x])lang=x}catch(_){const q=new URLSearchParams(location.search).get("lang");if(TEXT[q])lang=q}const t=()=>TEXT[lang],shuffle=a=>{for(let i=a.length-1;i;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};
function speak(text){if(!("speechSynthesis" in window)||!("SpeechSynthesisUtterance" in window))return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang=lang==="zh"?"zh-CN":lang==="en"?"en-US":"es-ES";u.rate=.82;window.speechSynthesis.speak(u)}
function applyText(){document.documentElement.lang=lang==="zh"?"zh-Hans":lang;document.title=t().title;el.title.textContent=t().title;el.instruction.textContent=t().instruction;el.home.href=`index.html?lang=${lang}`;el.home.setAttribute("aria-label",t().home);el.speak.setAttribute("aria-label",t().speak);el.top.setAttribute("aria-label",t().controls);el.language.setAttribute("aria-label",t().language);el.choices.setAttribute("aria-label",t().options);el.finishTitle.textContent=t().finish;el.finishText.textContent=t().finishText;el.again.textContent=t().again;document.querySelectorAll("[data-lang]").forEach(b=>b.setAttribute("aria-pressed",String(b.dataset.lang===lang)))}
function makeSequence(){const base=shuffle(["stop","wait","go"]),out=[];while(out.length<TOTAL){for(const x of shuffle([...base])){if(x!==out.at(-1))out.push(x);if(out.length===TOTAL)break}}return out}
function start(){round=0;sequence=makeSequence();el.finish.classList.remove("show");el.game.hidden=false;showRound()}
function showRound(){locked=false;el.feedback.textContent="";const answer=sequence[round];el.progress.textContent=t().progress(round+1,TOTAL);document.querySelectorAll("[data-light]").forEach(x=>x.classList.toggle("on",x.dataset.light===answer));el.traffic.setAttribute("aria-label",t().signal(t().actions[answer][1]));el.traveler.textContent=TRAVELERS[round%TRAVELERS.length];el.choices.replaceChildren(...["stop","wait","go"].map(key=>{const b=document.createElement("button");b.type="button";b.className="choice";b.setAttribute("aria-label",t().actions[key][0]);b.innerHTML=`<span class="emoji" aria-hidden="true">${ACTIONS[key].emoji}</span><span class="label">${t().actions[key][0]}</span>`;b.onclick=()=>choose(b,key,answer);return b}))}
function choose(button,key,answer){if(locked)return;if(key===answer){locked=true;button.classList.add("correct");el.feedback.textContent=t().right;speak(`${t().actions[answer][0]}. ${t().right}`);setTimeout(()=>{round++;if(round<TOTAL)showRound();else complete()},700)}else{button.classList.add("wrong");setTimeout(()=>button.classList.remove("wrong"),450);el.feedback.textContent=t().wrong;speak(t().wrong)}}function complete(){el.game.hidden=true;el.finish.classList.add("show");el.progress.textContent=`${TOTAL} / ${TOTAL}`;speak(`${t().finish} ${t().finishText}`)}
el.speak.onclick=()=>{const answer=sequence[round]||"stop";speak(`${t().instruction} ${t().signal(t().actions[answer][1])}`)};el.again.onclick=start;el.language.onclick=e=>{const b=e.target.closest("[data-lang]");if(!b)return;lang=b.dataset.lang;try{localStorage.setItem("kidsGameLanguage",lang)}catch(_){}const u=new URL(location.href);u.searchParams.set("lang",lang);history.replaceState(null,"",u);applyText();if(!el.game.hidden)showRound()};applyText();start();
</script>
</body>
</html>
