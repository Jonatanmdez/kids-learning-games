<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Laberinto de caminos</title>
<style>
:root{--ink:#3c342e;--paper:#fff8e8;--green:#59c978;--blue:#57aee8;--yellow:#ffd45c;--red:#ff7676;--shadow:#d9c9aa}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;font-family:ui-rounded,"SF Pro Rounded",system-ui,sans-serif;color:var(--ink);background:var(--paper)}
body{min-height:100dvh;display:flex;justify-content:center;user-select:none;-webkit-user-select:none;padding:calc(10px + env(safe-area-inset-top)) 12px calc(12px + env(safe-area-inset-bottom))}
main{width:min(680px,100%);display:flex;flex-direction:column;align-items:center;gap:10px}
h1{font-size:clamp(25px,5vw,38px);margin:0;text-align:center}.sub{margin:0;color:#806e5b;font-weight:700;text-align:center;font-size:clamp(15px,3vw,20px)}
.top{width:100%;display:flex;justify-content:space-between;align-items:center;min-height:48px}.pill{background:#fff;border-radius:20px;padding:8px 14px;box-shadow:0 4px 0 var(--shadow);font-weight:800}
button{font:inherit;color:inherit;cursor:pointer}.sound,.restart{border:0;background:#fff;border-radius:50%;width:48px;height:48px;font-size:23px;box-shadow:0 5px 0 var(--shadow)}
button:active{transform:translateY(3px);box-shadow:0 2px 0 var(--shadow)}
.board{width:min(72dvh,92vw,530px);aspect-ratio:1;display:grid;gap:clamp(4px,1vw,8px);padding:clamp(7px,1.5vw,12px);background:#d8edc9;border:5px solid #fff;border-radius:28px;box-shadow:0 8px 0 var(--shadow)}
.cell{border-radius:clamp(8px,2vw,16px);background:#fff;display:grid;place-items:center;font-size:clamp(25px,8.5vw,57px);position:relative;transition:transform .15s,background .15s}
.cell.wall{background:#78b95f}.cell.wall::after{content:"🌳";font-size:70%;filter:saturate(.85)}.cell.goal{background:#fff1a7}.cell.player{background:#ccecff;transform:scale(1.04)}
.controls{display:grid;grid-template-columns:repeat(3,clamp(64px,17vw,92px));grid-template-rows:repeat(2,clamp(58px,12vw,72px));gap:8px;grid-template-areas:". up ." "left down right"}
.move{border:0;border-radius:20px;background:var(--blue);color:#fff;font-size:clamp(27px,7vw,40px);font-weight:900;box-shadow:0 6px 0 #3687b9}.move:active{box-shadow:0 2px 0 #3687b9}.up{grid-area:up}.left{grid-area:left}.down{grid-area:down}.right{grid-area:right}
.message{min-height:30px;font-size:clamp(18px,4vw,24px);font-weight:900;text-align:center}.win{animation:pop .5s ease}.shake{animation:shake .35s ease}
.overlay{position:fixed;inset:0;background:rgba(255,248,232,.96);display:grid;place-items:center;padding:24px;z-index:5;transition:opacity .25s}.overlay.hidden{opacity:0;pointer-events:none}.card{width:min(440px,94vw);text-align:center;background:#fff;border-radius:32px;padding:28px;box-shadow:0 10px 0 var(--shadow)}
.hero{font-size:92px}.card h2{font-size:34px;margin:5px}.card p{font-size:19px;color:#806e5b;font-weight:700}.start{border:0;border-radius:24px;background:var(--green);color:#fff;font-size:25px;font-weight:900;padding:18px 32px;box-shadow:0 7px 0 #369c55}
.confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden}.confetti i{position:absolute;top:-20px;width:12px;height:16px;border-radius:3px;animation:fall 1.4s linear forwards}
@keyframes pop{50%{transform:scale(1.18)}}@keyframes shake{25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}@keyframes fall{to{transform:translateY(110dvh) rotate(600deg)}}
@media (max-height:720px){main{gap:5px}.board{width:min(55dvh,88vw,430px)}.sub{display:none}.controls{grid-template-columns:repeat(3,62px);grid-template-rows:repeat(2,52px)}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<main>
  <div class="top"><button class="restart" id="restart" aria-label="Volver a empezar">↻</button><div class="pill" id="levelLabel">Camino 1</div><button class="sound" id="sound" aria-label="Repetir instrucción">🔊</button></div>
  <h1>Laberinto de caminos</h1>
  <p class="sub" id="instruction">Lleva al animal hasta su comida</p>
  <div class="board" id="board" role="grid" aria-label="Laberinto"></div>
  <div class="message" id="message" aria-live="polite"></div>
  <div class="controls" aria-label="Controles de movimiento">
    <button class="move up" data-dr="-1" data-dc="0" aria-label="Mover arriba">↑</button>
    <button class="move left" data-dr="0" data-dc="-1" aria-label="Mover a la izquierda">←</button>
    <button class="move down" data-dr="1" data-dc="0" aria-label="Mover abajo">↓</button>
    <button class="move right" data-dr="0" data-dc="1" aria-label="Mover a la derecha">→</button>
  </div>
</main>
<div class="overlay" id="welcome"><div class="card"><div class="hero">🐰🥕</div><h2>¡Busca el camino!</h2><p>Usa las flechas para llevar al animal hasta su comida.</p><button class="start" id="start">Jugar</button></div></div>
<div class="confetti" id="confetti" aria-hidden="true"></div>
<script>
const LEVELS=[
 {pet:'🐰',food:'🥕',map:['.....','###.#','...#.', '.###.','.....'],start:[0,0],goal:[0,4]},
 {pet:'🐶',food:'🦴',map:['..#..','#.#.#','#...#','###..','.....'],start:[0,0],goal:[4,4]},
 {pet:'🐵',food:'🍌',map:['.....','.###.','...#.','.#.#.','.#...'],start:[4,0],goal:[0,4]},
 {pet:'🐱',food:'🐟',map:['...#.','.#...','.#.##','.#...','...#.'],start:[0,0],goal:[4,4]},
 {pet:'🐼',food:'🎋',map:['.....','.#.##','.#...','.###.','.....'],start:[4,0],goal:[0,4]}
];
const $=id=>document.getElementById(id);let level=0,pos=[0,0],locked=true,timer=null;
function speak(text){if(!('speechSynthesis'in window))return;if(typeof window.__kidsSpeak==='function'){window.__kidsSpeak(text,.86,1.12);return}window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang=window.__gameLang==='zh'?'zh-CN':window.__gameLang==='en'?'en-US':'es-ES';u.rate=.86;u.pitch=1.12;window.speechSynthesis.speak(u)}
function current(){return LEVELS[level]}
function render(){const l=current(),b=$('board');b.style.gridTemplateColumns=`repeat(${l.map[0].length},1fr)`;b.innerHTML='';l.map.forEach((row,r)=>[...row].forEach((v,c)=>{const cell=document.createElement('div');cell.className='cell'+(v==='#'?' wall':'')+(r===l.goal[0]&&c===l.goal[1]?' goal':'')+(r===pos[0]&&c===pos[1]?' player':'');cell.setAttribute('role','gridcell');if(r===l.goal[0]&&c===l.goal[1])cell.textContent=l.food;if(r===pos[0]&&c===pos[1])cell.textContent=l.pet;b.appendChild(cell)}));$('levelLabel').textContent=`Camino ${level+1} de ${LEVELS.length}`}
function loadLevel(){clearTimeout(timer);pos=[...current().start];locked=false;$('message').textContent='';render();speak(`Lleva al animal hasta su comida`)}
function move(dr,dc){if(locked)return;const l=current(),nr=pos[0]+dr,nc=pos[1]+dc;if(nr<0||nc<0||nr>=l.map.length||nc>=l.map[0].length||l.map[nr][nc]==='#'){const b=$('board');b.classList.remove('shake');void b.offsetWidth;b.classList.add('shake');$('message').textContent='Por ahí no 🌳';speak('Por ahí no');return}pos=[nr,nc];$('message').textContent='';render();if(nr===l.goal[0]&&nc===l.goal[1])win()}
function win(){locked=true;$('message').textContent='¡Lo encontraste! ⭐';$('board').classList.add('win');burst();speak('¡Muy bien! Lo encontraste');timer=setTimeout(()=>{$('board').classList.remove('win');level=(level+1)%LEVELS.length;loadLevel()},1700)}
function burst(){const colors=['#ff7676','#ffd45c','#59c978','#57aee8'];for(let i=0;i<24;i++){const p=document.createElement('i');p.style.left=Math.random()*100+'vw';p.style.background=colors[i%4];p.style.animationDelay=Math.random()*.25+'s';$('confetti').appendChild(p);setTimeout(()=>p.remove(),1900)}}
document.querySelectorAll('.move').forEach(b=>b.addEventListener('click',()=>move(Number(b.dataset.dr),Number(b.dataset.dc))));
$('restart').onclick=loadLevel;$('sound').onclick=()=>speak('Lleva al animal hasta su comida');
$('start').onclick=()=>{$('welcome').classList.add('hidden');loadLevel()};
document.addEventListener('keydown',e=>{const keys={ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1]};if(keys[e.key]){e.preventDefault();move(...keys[e.key])}});render();
</script>

@media(max-height:620px){.kids-lang-switch{transform:scale(.82);transform-origin:bottom right}}
</style>
