<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light">
  <title>Ordena la secuencia</title>
  <style>
    :root {
      --ink: #40362f;
      --paper: #fff9ee;
      --card: #ffffff;
      --blue: #64b5f6;
      --blue-dark: #2779b9;
      --yellow: #ffd45c;
      --green: #63cf86;
      --red: #ff7979;
      --shadow: #dfd2bd;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body { margin: 0; min-height: 100%; }

    body {
      min-height: 100dvh;
      overflow-x: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 8%, #fff1a8 0 8%, transparent 9%),
        radial-gradient(circle at 92% 16%, #cceeff 0 7%, transparent 8%),
        var(--paper);
      font-family: ui-rounded, "SF Pro Rounded", system-ui, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    button { font: inherit; }

    .topbar {
      min-height: 62px;
      padding: max(10px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) 6px max(14px, env(safe-area-inset-left));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .rounds { font-size: clamp(19px, 4vw, 25px); letter-spacing: 3px; }

    .rounds span { opacity: .22; }
    .rounds span.done { opacity: 1; }

    .icon-button {
      width: 52px;
      height: 52px;
      border: 0;
      border-radius: 50%;
      background: white;
      color: var(--ink);
      box-shadow: 0 5px 0 var(--shadow);
      font-size: 25px;
      cursor: pointer;
    }

    .icon-button:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--shadow); }

    main {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 0 max(12px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
      text-align: center;
    }

    .story-title {
      margin: 2px 0 2px;
      font-size: clamp(25px, 5.5vw, 42px);
      line-height: 1.1;
    }

    .instruction {
      margin: 4px 0 12px;
      color: #75675c;
      font-size: clamp(17px, 3.8vw, 22px);
      font-weight: 700;
    }

    .answer-row, .choice-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(8px, 2vw, 18px);
    }

    .answer-row { margin: 0 auto 16px; }

    .slot {
      min-height: clamp(95px, 20vw, 150px);
      border: 4px dashed #c7baa6;
      border-radius: clamp(18px, 4vw, 28px);
      background: rgba(255,255,255,.55);
      display: grid;
      place-items: center;
      position: relative;
      overflow: visible;
    }

    .slot-number {
      font-size: clamp(34px, 8vw, 62px);
      font-weight: 900;
      color: #c7baa6;
    }

    .slot.filled { border-style: solid; border-color: var(--green); background: white; }
    .slot .scene-emoji { font-size: clamp(45px, 10vw, 82px); }
    .slot .mini-label { display: none; }

    .arrow {
      position: absolute;
      z-index: 2;
      top: 50%;
      right: -18px;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--yellow);
      font-size: 18px;
      font-weight: 900;
    }

    .choice-row { align-items: stretch; }

    .choice {
      min-height: clamp(130px, 29vw, 215px);
      padding: 8px 5px 11px;
      border: 0;
      border-radius: clamp(20px, 4vw, 30px);
      background: var(--card);
      box-shadow: 0 8px 0 var(--shadow);
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform .15s, opacity .2s;
    }

    .choice:active { transform: translateY(5px); box-shadow: 0 3px 0 var(--shadow); }
    .choice.used { visibility: hidden; pointer-events: none; }
    .scene-emoji { font-size: clamp(56px, 15vw, 112px); line-height: 1; }
    .mini-label { font-size: clamp(13px, 3.2vw, 19px); font-weight: 800; line-height: 1.12; }

    .choice.wrong { animation: shake .35s ease; box-shadow: 0 0 0 5px var(--red), 0 8px 0 var(--shadow); }
    .choice.correct { animation: pop .35s ease; box-shadow: 0 0 0 5px var(--green), 0 8px 0 var(--shadow); }

    .message {
      min-height: 38px;
      margin: 14px 0 0;
      font-size: clamp(20px, 4.5vw, 28px);
      font-weight: 900;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      padding: max(26px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(26px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
      background: rgba(255, 249, 238, .97);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .overlay[hidden] { display: none; }
    .hero { font-size: clamp(80px, 22vw, 150px); line-height: 1; }
    .overlay h1 { margin: 12px 0 6px; font-size: clamp(32px, 8vw, 58px); line-height: 1; }
    .overlay p { max-width: 520px; margin: 4px 0 22px; font-size: clamp(18px, 4vw, 24px); font-weight: 700; color: #75675c; }

    .big-button {
      min-width: min(320px, 82vw);
      min-height: 72px;
      padding: 14px 30px;
      border: 0;
      border-radius: 28px;
      color: white;
      background: var(--blue-dark);
      box-shadow: 0 8px 0 #175786;
      font-size: clamp(24px, 6vw, 34px);
      font-weight: 900;
      cursor: pointer;
    }

    .big-button:active { transform: translateY(5px); box-shadow: 0 3px 0 #175786; }

    .confetti { position: fixed; inset: 0; z-index: 30; pointer-events: none; overflow: hidden; }
    .confetti i { position: absolute; top: -20px; width: 12px; height: 18px; border-radius: 4px; animation: fall 1.4s linear forwards; }

    @keyframes shake { 25% { transform: translateX(-8px); } 50% { transform: translateX(8px); } 75% { transform: translateX(-5px); } }
    @keyframes pop { 50% { transform: scale(1.09); } }
    @keyframes fall { to { transform: translateY(110vh) rotate(500deg); } }

    @media (max-height: 620px) and (orientation: landscape) {
      .topbar { min-height: 48px; padding-top: 4px; }
      .icon-button { width: 42px; height: 42px; }
      .story-title { font-size: 24px; }
      .instruction { margin: 1px 0 7px; font-size: 16px; }
      .slot { min-height: 70px; }
      .choice { min-height: 112px; }
      .scene-emoji { font-size: 54px; }
      .slot .scene-emoji { font-size: 42px; }
      .message { margin-top: 8px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <button id="homeButton" class="icon-button" type="button" aria-label="Volver al inicio">🏠</button>
    <div id="rounds" class="rounds" aria-label="Progreso"></div>
    <button id="speakButton" class="icon-button" type="button" aria-label="Repetir la instrucción">🔊</button>
  </header>

  <main id="game" aria-live="polite">
    <h1 id="storyTitle" class="story-title"></h1>
    <p class="instruction">Toca lo que pasa primero, después y al final.</p>

    <section id="answerRow" class="answer-row" aria-label="Tu secuencia"></section>
    <section id="choiceRow" class="choice-row" aria-label="Escenas para ordenar"></section>
    <p id="message" class="message" role="status"></p>
  </main>

  <section id="startScreen" class="overlay">
    <div class="hero" aria-hidden="true">🧩</div>
    <h1>Ordena la secuencia</h1>
    <p>Mira las imágenes y toca qué pasa primero, después y al final.</p>
    <button id="startButton" class="big-button" type="button">¡Jugar! ▶</button>
  </section>

  <section id="finishScreen" class="overlay" hidden>
    <div class="hero" aria-hidden="true">🏆</div>
    <h1>¡Muy bien!</h1>
    <p>Has ordenado todas las historias.</p>
    <button id="againButton" class="big-button" type="button">Otra vez ↻</button>
  </section>
  <div id="confetti" class="confetti" aria-hidden="true"></div>

  <script>
    "use strict";

    const STORIES = [
      { title: "La planta", spoken: "Ordena cómo crece una planta", steps: [["🫘", "Semilla"], ["🌱", "Brote"], ["🌻", "Flor"]] },
      { title: "Por la mañana", spoken: "Ordena la rutina de la mañana", steps: [["🛏️", "Despertar"], ["🪥", "Cepillarse"], ["👕", "Vestirse"]] },
      { title: "Manos limpias", spoken: "Ordena cómo lavarse las manos", steps: [["🚰", "Mojar"], ["🧼", "Enjabonar"], ["👐", "Aclarar"]] },
      { title: "Un dibujo", spoken: "Ordena cómo hacer un dibujo", steps: [["📄", "Papel"], ["🖍️", "Dibujar"], ["🖼️", "Terminado"]] },
      { title: "La merienda", spoken: "Ordena cómo preparar la merienda", steps: [["🍞", "Pan"], ["🧀", "Añadir queso"], ["🥪", "Bocadillo"]] },
      { title: "Día de lluvia", spoken: "Ordena qué hacemos cuando llueve", steps: [["🌧️", "Llueve"], ["🧥", "Ponerse el abrigo"], ["☂️", "Abrir el paraguas"]] },
      { title: "A dormir", spoken: "Ordena la rutina para ir a dormir", steps: [["🛁", "Bañarse"], ["🪥", "Cepillarse"], ["😴", "Dormir"]] },
      { title: "La mariposa", spoken: "Ordena cómo nace una mariposa", steps: [["🥚", "Huevo"], ["🐛", "Oruga"], ["🦋", "Mariposa"]] }
    ];

    const ROUNDS_PER_GAME = 5;
    const els = {
      start: document.getElementById("startScreen"),
      finish: document.getElementById("finishScreen"),
      startButton: document.getElementById("startButton"),
      againButton: document.getElementById("againButton"),
      home: document.getElementById("homeButton"),
      speak: document.getElementById("speakButton"),
      title: document.getElementById("storyTitle"),
      rounds: document.getElementById("rounds"),
      answers: document.getElementById("answerRow"),
      choices: document.getElementById("choiceRow"),
      message: document.getElementById("message"),
      confetti: document.getElementById("confetti")
    };

    let deck = [];
    let round = 0;
    let expected = 0;
    let current = null;
    let active = false;
    let locked = false;
    let nextTimer = 0;
    let audioContext = null;

    function shuffled(items) {
      const copy = items.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function safeSpeak(text) {
      if (!active || !("speechSynthesis" in window) || typeof SpeechSynthesisUtterance === "undefined") return;
      if (typeof window.__kidsSpeak === "function") {
        window.__kidsSpeak(text, .88, 1.12);
        return;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = window.__gameLang === "zh" ? "zh-CN" : window.__gameLang === "en" ? "en-US" : "es-ES";
      utterance.rate = 0.88;
      utterance.pitch = 1.12;
      window.speechSynthesis.speak(utterance);
    }

    function ensureAudio() {
      if (audioContext) return audioContext;
      const AudioCtor = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtor) return null;
      try { audioContext = new AudioCtor(); } catch (_) { return null; }
      return audioContext;
    }

    function chime(good) {
      const ctx = ensureAudio();
      if (!ctx) return;
      if (ctx.state === "suspended") ctx.resume().catch(() => {});
      const notes = good ? [523, 659, 784] : [220, 185];
      notes.forEach((frequency, index) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const start = ctx.currentTime + index * .1;
        osc.type = "sine";
        osc.frequency.value = frequency;
        gain.gain.setValueAtTime(.0001, start);
        gain.gain.exponentialRampToValueAtTime(.11, start + .015);
        gain.gain.exponentialRampToValueAtTime(.0001, start + .14);
        osc.connect(gain).connect(ctx.destination);
        osc.start(start);
        osc.stop(start + .16);
      });
    }

    function renderProgress() {
      els.rounds.innerHTML = "";
      for (let i = 0; i < ROUNDS_PER_GAME; i++) {
        const star = document.createElement("span");
        star.textContent = "★";
        if (i < round) star.className = "done";
        els.rounds.appendChild(star);
      }
      els.rounds.setAttribute("aria-label", `${round} de ${ROUNDS_PER_GAME} historias completadas`);
    }

    function sceneContent(container, step) {
      const emoji = document.createElement("span");
      emoji.className = "scene-emoji";
      emoji.setAttribute("aria-hidden", "true");
      emoji.textContent = step[0];
      const label = document.createElement("span");
      label.className = "mini-label";
      label.textContent = step[1];
      container.append(emoji, label);
    }

    function renderSlots() {
      els.answers.innerHTML = "";
      for (let i = 0; i < 3; i++) {
        const slot = document.createElement("div");
        slot.className = "slot";
        slot.setAttribute("aria-label", `Paso ${i + 1}, vacío`);
        const number = document.createElement("span");
        number.className = "slot-number";
        number.textContent = String(i + 1);
        slot.appendChild(number);
        if (i < 2) {
          const arrow = document.createElement("span");
          arrow.className = "arrow";
          arrow.setAttribute("aria-hidden", "true");
          arrow.textContent = "›";
          slot.appendChild(arrow);
        }
        els.answers.appendChild(slot);
      }
    }

    function renderChoices() {
      els.choices.innerHTML = "";
      shuffled(current.steps.map((step, index) => ({ step, index }))).forEach(item => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "choice";
        button.dataset.index = String(item.index);
        button.setAttribute("aria-label", item.step[1]);
        sceneContent(button, item.step);
        button.addEventListener("click", () => choose(button, item.index));
        els.choices.appendChild(button);
      });
    }

    function newRound() {
      window.clearTimeout(nextTimer);
      if (!active) return;
      if (round >= ROUNDS_PER_GAME) {
        finishGame();
        return;
      }
      current = deck[round];
      expected = 0;
      locked = false;
      els.title.textContent = current.title;
      els.message.textContent = "";
      renderProgress();
      renderSlots();
      renderChoices();
      safeSpeak(current.spoken);
    }

    function choose(button, index) {
      if (!active || locked || button.classList.contains("used")) return;
      if (index !== expected) {
        button.classList.remove("wrong");
        void button.offsetWidth;
        button.classList.add("wrong");
        els.message.textContent = "Casi… prueba otra vez 💛";
        chime(false);
        window.setTimeout(() => button.classList.remove("wrong"), 420);
        return;
      }

      button.classList.add("correct");
      chime(true);
      const slot = els.answers.children[expected];
      slot.innerHTML = "";
      slot.classList.add("filled");
      slot.setAttribute("aria-label", `Paso ${expected + 1}: ${current.steps[index][1]}`);
      sceneContent(slot, current.steps[index]);
      if (expected < 2) {
        const arrow = document.createElement("span");
        arrow.className = "arrow";
        arrow.setAttribute("aria-hidden", "true");
        arrow.textContent = "›";
        slot.appendChild(arrow);
      }
      window.setTimeout(() => button.classList.add("used"), 180);
      expected++;

      if (expected === 3) {
        locked = true;
        round++;
        renderProgress();
        els.message.textContent = "¡Lo has ordenado! ⭐";
        safeSpeak("¡Muy bien! Lo has ordenado.");
        nextTimer = window.setTimeout(newRound, 1700);
      } else {
        els.message.textContent = expected === 1 ? "¡Bien! ¿Qué pasa después?" : "¡Genial! ¿Y al final?";
      }
    }

    function confetti() {
      els.confetti.innerHTML = "";
      const colors = ["#ff7979", "#ffd45c", "#63cf86", "#64b5f6", "#b78bea"];
      for (let i = 0; i < 42; i++) {
        const piece = document.createElement("i");
        piece.style.left = `${Math.random() * 100}%`;
        piece.style.background = colors[i % colors.length];
        piece.style.animationDelay = `${Math.random() * .5}s`;
        piece.style.animationDuration = `${1.1 + Math.random() * .8}s`;
        els.confetti.appendChild(piece);
      }
      window.setTimeout(() => { els.confetti.innerHTML = ""; }, 2200);
    }

    function startGame() {
      window.clearTimeout(nextTimer);
      ensureAudio();
      active = true;
      locked = false;
      round = 0;
      deck = shuffled(STORIES).slice(0, ROUNDS_PER_GAME);
      els.start.hidden = true;
      els.finish.hidden = true;
      newRound();
    }

    function finishGame() {
      active = false;
      locked = true;
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      els.finish.hidden = false;
      confetti();
    }

    function goHome() {
      window.clearTimeout(nextTimer);
      active = false;
      locked = true;
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      els.finish.hidden = true;
      els.start.hidden = false;
      els.message.textContent = "";
    }

    els.startButton.addEventListener("click", startGame);
    els.againButton.addEventListener("click", startGame);
    els.home.addEventListener("click", goHome);
    els.speak.addEventListener("click", () => {
      if (active && current) safeSpeak(`${current.spoken}. Toca primero, después y al final.`);
    });

    renderProgress();
  </script>

<style id="kids-i18n-style">
.kids-lang-switch{position:fixed;z-index:1000;right:max(8px,env(safe-area-inset-right));bottom:max(8px,env(safe-area-inset-bottom));display:flex;gap:3px;padding:4px;background:rgba(255,255,255,.94);border:2px solid rgba(80,70,60,.12);border-radius:18px;box-shadow:0 4px 12px rgba(50,40,30,.18);font-family:ui-rounded,"SF Pro Rounded",system-ui,sans-serif}
.kids-lang-switch button{min-width:37px;min-height:34px;padding:3px 6px;border:0;border-radius:13px;background:transparent;color:#51463e;font:800 13px/1 system-ui,sans-serif;box-shadow:none;transform:none}
.kids-lang-switch button[aria-pressed="true"]{background:#54b4f0;color:#fff}
.kids-lang-zh .cat .sub,.kids-lang-zh .cat .csub{display:none}
@media(max-height:620px){.kids-lang-switch{transform:scale(.82);transform-origin:bottom right}}
</style>

function translateAttributes(element){for(const a of ['aria-label','title','placeholder'])if(element.hasAttribute(a)){const v=tx(element.getAttribute(a));if(v!==element.getAttribute(a))element.setAttribute(a,v)}}
function translateNode(node){if(node.nodeType===3){if(!/^(SCRIPT|STYLE)$/.test(node.parentElement?.tagName||'')){const v=tx(node.nodeValue);if(v!==node.nodeValue)node.nodeValue=v}}else if(node.nodeType===1){translateAttributes(node);node.querySelectorAll?.('*').forEach(translateAttributes);const w=document.createTreeWalker(node,NodeFilter.SHOW_TEXT);while(w.nextNode())translateNode(w.currentNode)}}
if(lang!=='es'){document.title=tx(document.title);translateNode(document.body);}
function syncInactiveScreens(){document.querySelectorAll('[data-kids-inactive]').forEach(el=>{if(!el.matches('.screen.hide,.screen.hidden,.overlay.hide,.overlay.hidden')){el.inert=false;el.removeAttribute('aria-hidden');delete el.dataset.kidsInactive}});document.querySelectorAll('.screen.hide,.screen.hidden,.overlay.hide,.overlay.hidden').forEach(el=>{el.inert=true;el.setAttribute('aria-hidden','true');el.dataset.kidsInactive='true'})}
syncInactiveScreens();new MutationObserver(syncInactiveScreens).observe(document.body,{subtree:true,attributes:true,attributeFilter:['class']});
const observer=new MutationObserver(list=>{if(lang==='es')return;for(const change of list){if(change.type==='characterData')translateNode(change.target);else if(change.type==='attributes')translateNode(change.target);else change.addedNodes.forEach(translateNode)}});observer.observe(document.body,{subtree:true,childList:true,characterData:true,attributes:true,attributeFilter:['aria-label','title','placeholder']});
function wrap(name){const base=window[name];if(typeof base==='function'&&!base.__translated){const fn=function(text,...rest){return base(tx(text),...rest)};fn.__translated=true;window[name]=fn}}
wrap('speak');wrap('safeSpeak');
const box=document.createElement('div');box.className='kids-lang-switch';box.setAttribute('aria-label',lang==='es'?'Idioma':lang==='en'?'Language':'语言');[['es','ES'],['en','EN'],['zh','中文']].forEach(([code,label])=>{const b=document.createElement('button');b.type='button';b.textContent=label;b.setAttribute('aria-pressed',String(code===lang));b.setAttribute('aria-label',code==='es'?'Español':code==='en'?'English':'中文');b.onclick=()=>{try{localStorage.setItem('kidsGameLanguage',code)}catch(_){}const url=new URL(location.href);url.searchParams.set('lang',code);location.href=url.href};box.appendChild(b)});document.body.appendChild(box);
})();
