<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的中文游戏 · Panda chino V2</title>
<style>
  :root{
    --paper:#fff8ef; --ink:#4a3728; --muted:#806f5c; --red:#ff6b6b;
    --sun:#ffc93c; --mint:#5fd37a; --sky:#54b4f0; --grape:#9b72db;
    --pink:#ff8fb1; --teal:#38bdb6; --card:#fff; --shadow:#e7d8c4;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; min-height:100%}
  body{
    min-height:100vh; min-height:100dvh; overflow-x:hidden;
    font-family:"SF Pro Rounded",ui-rounded,"Hiragino Maru Gothic ProN",system-ui,sans-serif;
    color:var(--ink); background:radial-gradient(120% 80% at 50% -10%,#ffe9ce 0%,var(--paper) 58%);
    display:flex; flex-direction:column; user-select:none; -webkit-user-select:none;
  }
  button{font:inherit}
  button:focus-visible{outline:5px solid #275d93; outline-offset:4px}
  .sr-only{position:absolute!important; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0}

  .screen{
    position:fixed; inset:0; z-index:30; overflow:auto;
    background:radial-gradient(120% 80% at 50% -10%,#ffe9ce 0%,var(--paper) 60%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; padding:24px; text-align:center; transition:opacity .3s;
  }
  .screen.hide{opacity:0; pointer-events:none; visibility:hidden; transition:opacity .3s,visibility 0s .3s}
  .hero{font-size:clamp(70px,15vh,126px); line-height:1; animation:float 3s ease-in-out infinite}
  .title{font-size:clamp(27px,5vh,42px); margin:0; font-weight:900}
  .subtitle{font-size:clamp(15px,2.4vh,20px); color:var(--muted); margin:0 0 6px; font-weight:650}
  .cats{display:grid; grid-template-columns:repeat(2,minmax(132px,1fr)); gap:13px; width:min(450px,92vw)}
  .cat{
    border:0; border-radius:24px; padding:17px 10px; color:#fff; cursor:pointer;
    font-weight:850; font-size:clamp(17px,2.6vh,22px); min-height:98px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    box-shadow:0 8px 0 rgba(0,0,0,.14); transition:transform .1s,box-shadow .1s;
  }
  .cat:active{transform:translateY(5px); box-shadow:0 3px 0 rgba(0,0,0,.14)}
  .cat .icon{font-size:34px}.cat .sub{font-size:13px; font-weight:650; opacity:.92}
  .animals{background:var(--mint)}.colors{background:var(--grape)}.numbers{background:var(--sky)}
  .food{background:var(--red)}.fruit{background:var(--pink)}.bodycat{background:var(--teal)}
  .cat.all{background:var(--sun); color:#684c08; grid-column:1/3; min-height:76px}
  .levels{display:grid; gap:16px; width:min(430px,92vw)}
  .level{
    border:0; border-radius:24px; padding:18px 20px; color:#fff; cursor:pointer;
    display:grid; grid-template-columns:auto 1fr; column-gap:14px; align-items:center;
    text-align:left; box-shadow:0 8px 0 rgba(0,0,0,.14); transition:transform .1s,box-shadow .1s;
  }
  .level:active{transform:translateY(5px);box-shadow:0 3px 0 rgba(0,0,0,.14)}
  .level .licon{font-size:38px;grid-row:1/3}.level strong{font-size:22px}.level small{font-size:14px;font-weight:650;opacity:.92}
  .level.easy{background:var(--mint)}.level.medium{background:var(--sky)}.level.hard{background:var(--grape)}
  .back{
    border:0;background:#fff;color:var(--ink);border-radius:18px;padding:11px 20px;
    font-weight:800;cursor:pointer;box-shadow:0 5px 0 var(--shadow)
  }

  .topbar{height:62px; display:flex; align-items:center; justify-content:center; padding:8px 70px 0; position:relative}
  .home{
    position:fixed; top:10px; left:12px; z-index:6; border:0; background:#fff;
    box-shadow:0 4px 0 var(--shadow); border-radius:50%; width:48px; height:48px;
    font-size:22px; cursor:pointer;
  }
  .home:active{transform:translateY(3px); box-shadow:0 1px 0 var(--shadow)}
  .score{font-size:clamp(15px,2.5vh,21px); text-align:center; font-weight:750}
  .progress{position:fixed; top:0; left:0; right:0; height:5px; background:#eadfce; z-index:8}
  .progress span{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--sky),var(--mint)); transition:width .3s}

  .stage{display:flex; flex-direction:column; align-items:center; text-align:center; padding:2px 16px 6px}
  .panda{
    border:0; background:transparent; padding:0; font-size:clamp(64px,13vh,112px);
    line-height:1; cursor:pointer; filter:drop-shadow(0 5px 0 rgba(74,55,40,.10));
  }
  .panda.cheer{animation:cheer .65s ease}.panda.sad{animation:sad .5s ease}
  .speech{min-height:38px; color:var(--muted); font-weight:750; font-size:clamp(14px,2.2vh,18px); margin-top:2px}
  .prompt{display:flex; flex-direction:column; align-items:center; gap:0}
  .hanzi{font-size:clamp(42px,8vh,76px); font-weight:900; letter-spacing:2px; line-height:1.05}
  .pinyin{font-size:clamp(18px,3vh,25px); color:var(--muted); font-weight:700; margin-top:3px}
  .speaker{
    margin-top:9px; width:clamp(66px,10vh,88px); height:clamp(66px,10vh,88px);
    border:0; border-radius:50%; background:var(--sun); box-shadow:0 7px 0 #dea529;
    font-size:clamp(31px,5vh,43px); cursor:pointer; color:#684c08;
  }
  .speaker:active{transform:translateY(5px); box-shadow:0 2px 0 #dea529}
  .speaker[disabled]{filter:grayscale(.65); opacity:.65; cursor:not-allowed}

  .cards{
    flex:1 1 auto; width:100%; display:grid; grid-template-columns:repeat(3,minmax(0,1fr));
    gap:clamp(10px,2.4vw,24px); padding:clamp(10px,2vh,18px) clamp(14px,4vw,40px) 36px;
    align-content:center;
  }
  .cards.medium{grid-template-columns:repeat(4,minmax(0,1fr))}
  .cards.hard{grid-template-columns:repeat(3,minmax(0,1fr));max-width:900px;align-self:center}
  .card{
    background:var(--card); border-radius:28px; border:0; box-shadow:0 10px 0 var(--shadow);
    aspect-ratio:1; min-height:110px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; overflow:hidden; position:relative; transition:transform .1s,box-shadow .1s;
  }
  .card:active{transform:translateY(7px); box-shadow:0 3px 0 var(--shadow)}
  .emoji{font-size:clamp(54px,14vh,124px); line-height:1}
  .swatchdot{width:62%; height:62%; border-radius:50%; border:5px solid rgba(74,55,40,.2); box-shadow:inset 0 0 0 2px rgba(255,255,255,.45)}
  .dots{display:flex; flex-wrap:wrap; gap:6%; justify-content:center; align-items:center; width:82%; height:82%}
  .dots span{font-size:clamp(18px,4.5vh,42px); line-height:1}
  .number{font-size:clamp(52px,13vh,118px);font-weight:950;color:var(--sky);line-height:1}
  .card.correct{animation:pop .5s ease; box-shadow:0 0 0 6px var(--mint),0 10px 0 var(--shadow)}
  .card.wrong{animation:wobble .45s ease; box-shadow:0 0 0 5px var(--red),0 10px 0 var(--shadow)}
  .confetti{position:fixed; inset:0; pointer-events:none; z-index:20; overflow:hidden}
  .confetti i{position:absolute; top:-20px; width:12px; height:12px; border-radius:3px; animation:fall linear forwards}
  .hint{position:fixed; bottom:5px; left:0; right:0; text-align:center; font-size:12px; color:#9c8b74; z-index:4; pointer-events:none}

  @keyframes float{50%{transform:translateY(-12px)}}
  @keyframes cheer{30%{transform:scale(1.25) rotate(-8deg)}60%{transform:scale(1.25) rotate(8deg)}}
  @keyframes sad{25%{transform:rotate(-7deg)}75%{transform:rotate(7deg)}}
  @keyframes pop{40%{transform:scale(1.12)}}
  @keyframes wobble{20%{transform:translateX(-12px)}40%{transform:translateX(12px)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)}}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg); opacity:.9}}
  @media(max-height:700px){.panda{font-size:58px}.speech{min-height:25px}.speaker{width:60px;height:60px}.cards{padding-top:7px}.stage{padding-top:0}}
  @media(max-width:700px){.cards.medium{grid-template-columns:repeat(2,minmax(0,1fr));max-width:520px;align-self:center}}
  @media(max-width:520px){.cards{gap:9px;padding-left:10px;padding-right:10px}.card{border-radius:20px;min-height:94px}.hint{font-size:11px}}
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important; transition:none!important}}
</style>
</head>
<body>
  <div class="screen" id="startScreen">
    <div class="hero" aria-hidden="true">🐼</div>
    <h1 class="title"><span lang="zh-CN">我的中文游戏</span></h1>
    <p class="subtitle">Escucha y toca · primeras palabras en chino</p>
    <div class="cats" id="cats" aria-label="Elige una categoría">
      <button class="cat animals" data-cat="animals"><span class="icon" aria-hidden="true">🐰</span><span lang="zh-CN">动物</span><span class="sub">Animales</span></button>
      <button class="cat colors" data-cat="colors"><span class="icon" aria-hidden="true">🎨</span><span lang="zh-CN">颜色</span><span class="sub">Colores</span></button>
      <button class="cat numbers" data-cat="numbers"><span class="icon" aria-hidden="true">🔢</span><span lang="zh-CN">数字</span><span class="sub">Números</span></button>
      <button class="cat food" data-cat="food"><span class="icon" aria-hidden="true">🍗</span><span lang="zh-CN">食物</span><span class="sub">Comida</span></button>
      <button class="cat fruit" data-cat="fruit"><span class="icon" aria-hidden="true">🍓</span><span lang="zh-CN">水果</span><span class="sub">Fruta</span></button>
      <button class="cat bodycat" data-cat="body"><span class="icon" aria-hidden="true">🖐️</span><span lang="zh-CN">身体</span><span class="sub">Cuerpo</span></button>
      <button class="cat all" data-cat="all"><span class="icon" aria-hidden="true">✨</span>Todo mezclado</button>
    </div>
  </div>

  <div class="screen hide" id="levelScreen" aria-labelledby="levelTitle">
    <div class="hero" aria-hidden="true">🎯</div>
    <h2 class="title" id="levelTitle">Elige el nivel</h2>
    <p class="subtitle" id="levelCategory"></p>
    <div class="levels" id="levels">
      <button class="level easy" data-level="easy"><span class="licon" aria-hidden="true">🌱</span><strong>Fácil</strong><small>6 palabras · 3 respuestas</small></button>
      <button class="level medium" data-level="medium"><span class="licon" aria-hidden="true">🚀</span><strong>Medio</strong><small>12 palabras · 4 respuestas</small></button>
      <button class="level hard" data-level="hard"><span class="licon" aria-hidden="true">🏆</span><strong>Difícil</strong><small>36 palabras · 6 respuestas</small></button>
    </div>
    <button class="back" id="levelBack">← Volver a categorías</button>
  </div>

  <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>
  <button class="home" id="homeBtn" aria-label="Volver al menú de categorías" hidden>🏠</button>
  <header class="topbar"><div class="score" id="score" aria-label="Progreso de la partida"></div></header>
  <main class="stage">
    <button class="panda" id="panda" aria-label="Panda: repetir la palabra">🐼</button>
    <div class="speech" id="pandaSpeech" aria-live="polite">¡Elige una categoría!</div>
    <div class="prompt">
      <div class="hanzi" id="hanzi" lang="zh-CN"></div>
      <div class="pinyin" id="pinyin"></div>
    </div>
    <button class="speaker" id="speaker" aria-label="Escuchar otra vez" disabled>🔊</button>
  </main>
  <section class="cards" id="cards" aria-label="Opciones de respuesta"></section>
  <div class="confetti" id="confetti" aria-hidden="true"></div>
  <div class="hint" id="audioHint">Toca el altavoz o el panda para repetir 🔊</div>
  <div class="sr-only" id="status" aria-live="assertive"></div>

Object.entries(ADVANCED_DATA).forEach(([cat,items])=>DATA[cat].push(...items));
const CATEGORY_NAMES={animals:"Animales",colors:"Colores",numbers:"Números",food:"Comida",fruit:"Fruta",body:"Cuerpo"};
const LEVELS={
  easy:{label:"Fácil",count:6,choices:3},
  medium:{label:"Medio",count:12,choices:4},
  hard:{label:"Difícil",count:36,choices:6}
};
Object.entries(DATA).forEach(([cat,items])=>items.forEach(item=>item.cat=cat));
const PRAISE=["好棒","太棒了","对了","真厉害"];
const $=id=>document.getElementById(id);

let synth=('speechSynthesis' in window)?window.speechSynthesis:null;
let zhVoice=null,pendingCategory=null,activeCategory=null,activeLevel=null,pool=[],targetQueue=[],current=null,lastTarget=null;
let streak=0,best=loadBest(),round=0,busy=false,timers=[];

function pickVoice(){
  if(!synth)return;
  const voices=synth.getVoices();
  zhVoice=voices.find(v=>/zh[-_]CN/i.test(v.lang))||voices.find(v=>/^zh/i.test(v.lang))||
    voices.find(v=>/chinese|中文|普通话|Tingting|Mei-?Jia|Ya-?ling/i.test(v.name))||null;
}
if(synth){pickVoice();synth.addEventListener?.('voiceschanged',pickVoice)}
else{$('audioHint').textContent="Este navegador no tiene voz; puedes jugar leyendo la palabra"}

function say(text,rate=.8){
  if(!synth||!text)return false;
  try{
    synth.cancel();
    const utterance=new SpeechSynthesisUtterance(text);
    utterance.lang="zh-CN"; utterance.rate=rate; utterance.pitch=1.08;
    if(zhVoice)utterance.voice=zhVoice;
    synth.speak(utterance); return true;
  }catch(error){
    $('audioHint').textContent="No se pudo activar la voz; el juego continúa sin sonido"; return false;
  }
}
function schedule(fn,delay){const id=setTimeout(()=>{timers=timers.filter(t=>t!==id);fn()},delay);timers.push(id);return id}
function clearPending(){timers.forEach(clearTimeout);timers=[];if(synth)try{synth.cancel()}catch(error){}}
function shuffle(items){
  const copy=[...items];
  for(let i=copy.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[copy[i],copy[j]]=[copy[j],copy[i]]}
  return copy;
}
function loadBest(){try{return Number.parseInt(localStorage.getItem('mejorRachaPandaV2'),10)||0}catch(error){return 0}}
function saveBest(value){try{localStorage.setItem('mejorRachaPandaV2',String(value))}catch(error){}}
function animatePanda(kind){const panda=$('panda');panda.classList.remove('cheer','sad');void panda.offsetWidth;panda.classList.add(kind);schedule(()=>panda.classList.remove(kind),700)}
function updateScore(){
  const language=window.__gameLang||'es';
  const rawLevel=activeLevel?LEVELS[activeLevel].label:'';
  const level=window.__translateGameText?window.__translateGameText(rawLevel):rawLevel;
  const roundLabel=language==='zh'?`第 <b>${round}</b> 轮`:language==='en'?`Round <b>${round}</b>`:`Ronda <b>${round}</b>`;
  $('score').innerHTML=`${level} · ${roundLabel} · 🔥 <b>${streak}</b> · 🏆 <b>${best}</b>`;
  $('progressBar').style.width=`${((round-1)%10+1)*10}%`;
}
function refillQueue(){
  targetQueue=shuffle(pool);
  if(lastTarget&&targetQueue.length>1&&targetQueue[0]===lastTarget){[targetQueue[0],targetQueue[1]]=[targetQueue[1],targetQueue[0]]}
}
function nextTarget(){if(!targetQueue.length)refillQueue();return targetQueue.shift()}
function distractorsFor(target){
  const needed=LEVELS[activeLevel].choices-1;
  let candidates=activeCategory==='all'?pool.filter(item=>item.cat===target.cat&&item!==target):pool.filter(item=>item!==target);
  if(candidates.length<needed)candidates=Object.values(DATA).flat().filter(item=>item!==target);
  return shuffle(candidates).slice(0,needed);
}
function renderFace(item){
  if(item.color)return `<div class="swatchdot" style="background:${item.color}"></div>`;
  if(item.n>12)return `<div class="number">${item.n}</div>`;
  if(item.n){const size=item.n<=5?'clamp(18px,4.5vh,42px)':'clamp(14px,3.2vh,28px)';return `<div class="dots">${Array.from({length:item.n},()=>`<span style="font-size:${size}">⭐</span>`).join('')}</div>`}
  return `<div class="emoji">${item.emoji}</div>`;
}
function announce(message){$('status').textContent='';schedule(()=>$('status').textContent=message,30)}

function chooseCategory(category){
  pendingCategory=category;
  $('levelCategory').textContent=category==='all'?'Todo mezclado':CATEGORY_NAMES[category];
  $('startScreen').classList.add('hide');$('levelScreen').classList.remove('hide');
}
function showCategories(){
  pendingCategory=null;$('levelScreen').classList.add('hide');$('startScreen').classList.remove('hide');
}
function startGame(category,level){
  clearPending(); activeCategory=category;activeLevel=level;
  $('confetti').replaceChildren(); $('panda').classList.remove('cheer','sad');
  const count=LEVELS[level].count;
  pool=category==='all'?Object.values(DATA).flatMap(items=>items.slice(0,count)):DATA[category].slice(0,count);
  targetQueue=[]; current=null; lastTarget=null; streak=0; round=0; busy=true;
  $('startScreen').classList.add('hide');$('levelScreen').classList.add('hide');$('homeBtn').hidden=false;$('speaker').disabled=!synth;
  $('pandaSpeech').textContent=category==='all'?`¡Todo mezclado en nivel ${LEVELS[level].label.toLowerCase()}!`:`¡${CATEGORY_NAMES[category]} en nivel ${LEVELS[level].label.toLowerCase()}!`;
  say("我们开始吧",.85); schedule(nextRound,700);
}
function showMenu(){
  clearPending(); current=null; busy=false; pendingCategory=null;activeCategory=null;activeLevel=null;
  $('confetti').replaceChildren(); $('panda').classList.remove('cheer','sad');
  $('levelScreen').classList.add('hide');$('startScreen').classList.remove('hide');$('homeBtn').hidden=true;$('score').textContent='';
  $('cards').replaceChildren(); $('hanzi').textContent=''; $('pinyin').textContent='';
  $('pandaSpeech').textContent='¡Elige una categoría!'; $('speaker').disabled=true; $('progressBar').style.width='0';
}
function nextRound(){
  busy=false; current=nextTarget(); lastTarget=current; round++;
  const choices=shuffle([current,...distractorsFor(current)]);
  $('hanzi').textContent=current.hz; $('pinyin').textContent=current.py; $('pandaSpeech').textContent='¿Cuál es?';
  const cards=$('cards');cards.className=`cards ${activeLevel}`;cards.replaceChildren();
  choices.forEach(item=>{
    const button=document.createElement('button');button.className='card';button.type='button';
    button.setAttribute('aria-label',`${item.hz} ${item.py}`);button.lang='zh-CN';button.innerHTML=renderFace(item);
    button.addEventListener('click',()=>choose(item,button));cards.appendChild(button);
  });
  updateScore();schedule(()=>say(current?.hz,.75),300);
}
function choose(item,element){
  if(busy||!current)return;
  if(item===current){
    busy=true;element.classList.add('correct');streak++;
    const record=streak>best;if(record){best=streak;saveBest(best)}
    updateScore();animatePanda('cheer');$('pandaSpeech').textContent='¡Muy bien!';announce(`Correcto: ${current.es}`);
    if(round%10===0){burst(42);say("太棒了",.9);$('pandaSpeech').textContent='¡Diez rondas! ¡Genial!';schedule(nextRound,1900)}
    else if(record){burst(24);say(PRAISE[Math.floor(Math.random()*PRAISE.length)],.9);schedule(nextRound,1450)}
    else{say("对",.9);schedule(nextRound,1050)}
  }else{
    busy=true;streak=0;updateScore();element.classList.add('wrong');animatePanda('sad');
    $('pandaSpeech').textContent='Prueba otra vez';announce(`Ese es ${item.es}. Prueba otra vez.`);
    schedule(()=>{element.classList.remove('wrong');busy=false;say(current?.hz,.7)},520);
  }
}
function burst(amount=26){
  const box=$('confetti'),colors=['#ff6b6b','#ffc93c','#5fd37a','#54b4f0','#9b72db'];
  for(let i=0;i<amount;i++){
    const piece=document.createElement('i');piece.style.left=Math.random()*100+'vw';piece.style.background=colors[i%colors.length];
    piece.style.animationDuration=(1+Math.random()*.8)+'s';piece.style.animationDelay=Math.random()*.2+'s';box.appendChild(piece);
    schedule(()=>piece.remove(),2200);
  }
}
$('cats').addEventListener('click',event=>{const button=event.target.closest('.cat');if(button)chooseCategory(button.dataset.cat)});
$('levels').addEventListener('click',event=>{const button=event.target.closest('.level');if(button&&pendingCategory)startGame(pendingCategory,button.dataset.level)});
$('levelBack').addEventListener('click',showCategories);
$('speaker').addEventListener('click',()=>{if(current)say(current.hz,.7)});
$('panda').addEventListener('click',()=>{if(current){animatePanda('cheer');say(current.hz,.7)}});
$('homeBtn').addEventListener('click',showMenu);
window.addEventListener('pagehide',clearPending);
</script>

function translateAttributes(element){for(const a of ['aria-label','title','placeholder'])if(element.hasAttribute(a)){const v=tx(element.getAttribute(a));if(v!==element.getAttribute(a))element.setAttribute(a,v)}}
function translateNode(node){if(node.nodeType===3){if(!/^(SCRIPT|STYLE)$/.test(node.parentElement?.tagName||'')){const v=tx(node.nodeValue);if(v!==node.nodeValue)node.nodeValue=v}}else if(node.nodeType===1){translateAttributes(node);node.querySelectorAll?.('*').forEach(translateAttributes);const w=document.createTreeWalker(node,NodeFilter.SHOW_TEXT);while(w.nextNode())translateNode(w.currentNode)}}
if(lang!=='es'){document.title=tx(document.title);translateNode(document.body);}
function syncInactiveScreens(){document.querySelectorAll('[data-kids-inactive]').forEach(el=>{if(!el.matches('.screen.hide,.screen.hidden,.overlay.hide,.overlay.hidden')){el.inert=false;el.removeAttribute('aria-hidden');delete el.dataset.kidsInactive}});document.querySelectorAll('.screen.hide,.screen.hidden,.overlay.hide,.overlay.hidden').forEach(el=>{el.inert=true;el.setAttribute('aria-hidden','true');el.dataset.kidsInactive='true'})}
syncInactiveScreens();new MutationObserver(syncInactiveScreens).observe(document.body,{subtree:true,attributes:true,attributeFilter:['class']});
const observer=new MutationObserver(list=>{if(lang==='es')return;for(const change of list){if(change.type==='characterData')translateNode(change.target);else if(change.type==='attributes')translateNode(change.target);else change.addedNodes.forEach(translateNode)}});observer.observe(document.body,{subtree:true,childList:true,characterData:true,attributes:true,attributeFilter:['aria-label','title','placeholder']});
function wrap(name){const base=window[name];if(typeof base==='function'&&!base.__translated){const fn=function(text,...rest){return base(tx(text),...rest)};fn.__translated=true;window[name]=fn}}
wrap('speak');wrap('safeSpeak');
const box=document.createElement('div');box.className='kids-lang-switch';box.setAttribute('aria-label',lang==='es'?'Idioma':lang==='en'?'Language':'语言');[['es','ES'],['en','EN'],['zh','中文']].forEach(([code,label])=>{const b=document.createElement('button');b.type='button';b.textContent=label;b.setAttribute('aria-pressed',String(code===lang));b.setAttribute('aria-label',code==='es'?'Español':code==='en'?'English':'中文');b.onclick=()=>{try{localStorage.setItem('kidsGameLanguage',code)}catch(_){}const url=new URL(location.href);url.searchParams.set('lang',code);location.href=url.href};box.appendChild(b)});document.body.appendChild(box);
})();
