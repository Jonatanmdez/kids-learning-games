<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#eaf7ff">
<title>Empareja las sombras</title>
<style>
:root{--ink:#27364a;--muted:#5f7188;--paper:#eaf7ff;--card:#fff;--blue:#4b9fe8;--shadow:#bfd5e5;--good:#16864b;--focus:#075ec5}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;font-family:ui-rounded,"SF Pro Rounded",system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--paper)}body{min-height:100dvh;padding:calc(12px + env(safe-area-inset-top)) max(12px,env(safe-area-inset-right)) calc(18px + env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left));background:radial-gradient(circle at 10% 8%,#fff2a8 0 7%,transparent 8%),linear-gradient(160deg,#f8fdff,#dff4ff)}button,a{font:inherit}.top{display:flex;align-items:center;justify-content:space-between;gap:10px;width:min(760px,100%);margin:auto}.icon-button{display:grid;place-items:center;width:52px;height:52px;border:0;border-radius:17px;background:#fff;color:var(--ink);box-shadow:0 5px 0 var(--shadow);font-size:25px;text-decoration:none;cursor:pointer}.progress{font-size:17px;font-weight:900}.language{display:flex;justify-content:center;gap:4px;margin:10px auto 0}.language button{min-width:45px;min-height:38px;border:0;border-radius:13px;background:#fff;color:var(--ink);font-weight:850}.language button[aria-pressed=true]{background:var(--blue);color:#fff}main{width:min(760px,100%);margin:10px auto 0;text-align:center}h1{margin:4px 0;font-size:clamp(27px,6vw,43px)}.instruction{margin:0;color:var(--muted);font-size:clamp(16px,3vw,20px);font-weight:750}.shadow-card{display:grid;place-items:center;width:min(260px,70vw);height:190px;margin:18px auto 16px;border-radius:35px;background:#fff;box-shadow:0 8px 0 var(--shadow)}.silhouette{font-size:110px;line-height:1;filter:grayscale(1) brightness(0);opacity:.82;transform:scale(1.08)}.choices{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.choice{min-height:142px;border:4px solid transparent;border-radius:28px;background:#fff;box-shadow:0 8px 0 var(--shadow);font-size:72px;cursor:pointer;transition:.14s transform,.14s box-shadow}.choice:active{transform:translateY(5px);box-shadow:0 3px 0 var(--shadow)}.choice.wrong{border-color:#ef8c68;animation:wiggle .3s}.choice.correct{border-color:var(--good);background:#e6fff0}.feedback{min-height:34px;margin:16px 0 0;font-size:clamp(18px,4vw,24px);font-weight:950}.finish{display:none;margin:35px auto 0;padding:28px;border-radius:32px;background:#fff;box-shadow:0 8px 0 var(--shadow)}.finish.show{display:block}.finish .star{font-size:84px}.again{min-height:58px;margin-top:16px;padding:10px 25px;border:0;border-radius:19px;background:#66c985;color:#123e21;box-shadow:0 6px 0 #3d9a5a;font-size:20px;font-weight:900;cursor:pointer}:focus-visible{outline:5px solid var(--focus);outline-offset:4px}@keyframes wiggle{25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}@media(max-width:480px){.shadow-card{height:155px;margin:12px auto}.silhouette{font-size:88px}.choices{gap:9px}.choice{min-height:112px;font-size:58px;border-radius:23px}}@media(max-height:500px) and (orientation:landscape){.language{position:fixed;top:max(8px,env(safe-area-inset-top));right:max(8px,env(safe-area-inset-right));z-index:4}.shadow-card{width:180px;height:115px;margin:8px auto}.silhouette{font-size:72px}.choice{min-height:95px;font-size:52px}h1{font-size:27px}}@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<nav class="top" aria-label="Controles"><a class="icon-button" id="home" href="index.html" aria-label="Volver al inicio">🏠</a><div class="progress" id="progress"></div><button class="icon-button" id="speak" type="button" aria-label="Repetir la instrucción">🔊</button></nav>
<div class="language" id="language" aria-label="Idioma"><button data-lang="es" aria-label="Español">ES</button><button data-lang="en" aria-label="English">EN</button><button data-lang="zh" aria-label="中文">中文</button></div>
<main>
  <section id="game"><h1 id="title"></h1><p class="instruction" id="instruction"></p><div class="shadow-card" aria-label="Sombra para emparejar"><span class="silhouette" id="shadow" aria-hidden="true"></span></div><div class="choices" id="choices" aria-label="Opciones"></div><div class="feedback" id="feedback" role="status" aria-live="polite"></div></section>
  <section class="finish" id="finish"><div class="star" aria-hidden="true">🌟</div><h1 id="finishTitle"></h1><p class="instruction" id="finishText"></p><button class="again" id="again" type="button"></button></section>
</main>
<script>
"use strict";
const TEXT={es:{title:"Empareja la sombra",instruction:"¿Qué dibujo tiene esta sombra?",progress:(a,b)=>`Sombra ${a} de ${b}`,options:"Elige un dibujo",shadow:"Sombra para emparejar",right:"¡Sí, es igual! ⭐",wrong:"Casi… mira la forma otra vez",finish:"¡Todas emparejadas!",finishText:"Has encontrado todas las sombras",again:"Otra vez ↻",home:"Volver al inicio",speak:"Repetir la instrucción",controls:"Controles",language:"Idioma"},en:{title:"Match the shadow",instruction:"Which picture has this shadow?",progress:(a,b)=>`Shadow ${a} of ${b}`,options:"Choose a picture",shadow:"Shadow to match",right:"Yes, it matches! ⭐",wrong:"Almost… look at the shape again",finish:"All matched!",finishText:"You found every shadow",again:"Again ↻",home:"Back to home",speak:"Repeat the instruction",controls:"Controls",language:"Language"},zh:{title:"匹配影子",instruction:"哪个图案和这个影子一样？",progress:(a,b)=>`第 ${a} / ${b} 个影子`,options:"选择一个图案",shadow:"要匹配的影子",right:"对啦，一模一样！⭐",wrong:"差一点……再看看形状",finish:"全部匹配成功！",finishText:"你找到了所有影子",again:"再玩一次 ↻",home:"返回首页",speak:"重复说明",controls:"控制",language:"语言"}};
const ITEMS=[{icon:"🐘",name:["elefante","elephant","大象"]},{icon:"🐰",name:["conejo","rabbit","兔子"]},{icon:"🐢",name:["tortuga","turtle","乌龟"]},{icon:"🐟",name:["pez","fish","鱼"]},{icon:"🦋",name:["mariposa","butterfly","蝴蝶"]},{icon:"🚗",name:["coche","car","汽车"]},{icon:"✈️",name:["avión","plane","飞机"]},{icon:"🍎",name:["manzana","apple","苹果"]},{icon:"🌻",name:["girasol","sunflower","向日葵"]}];
const TOTAL=6,el=Object.fromEntries(["home","progress","speak","language","game","title","instruction","shadow","choices","feedback","finish","finishTitle","finishText","again"].map(id=>[id,document.getElementById(id)]));let lang="es",round=0,order=[],locked=false;try{const q=new URLSearchParams(location.search).get("lang"),s=localStorage.getItem("kidsGameLanguage"),x=q||s;if(TEXT[x])lang=x}catch(_){const q=new URLSearchParams(location.search).get("lang");if(TEXT[q])lang=q}const t=()=>TEXT[lang],li=()=>lang==="en"?1:lang==="zh"?2:0,shuffle=a=>{for(let i=a.length-1;i;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};
function speak(text){if(!("speechSynthesis" in window)||!("SpeechSynthesisUtterance" in window))return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang=lang==="zh"?"zh-CN":lang==="en"?"en-US":"es-ES";u.rate=.82;window.speechSynthesis.speak(u)}
function applyText(){document.documentElement.lang=lang==="zh"?"zh-Hans":lang;document.title=t().title;el.title.textContent=t().title;el.instruction.textContent=t().instruction;el.home.href=`index.html?lang=${lang}`;el.home.setAttribute("aria-label",t().home);el.speak.setAttribute("aria-label",t().speak);document.querySelector(".top").setAttribute("aria-label",t().controls);el.language.setAttribute("aria-label",t().language);el.choices.setAttribute("aria-label",t().options);document.querySelector(".shadow-card").setAttribute("aria-label",t().shadow);el.finishTitle.textContent=t().finish;el.finishText.textContent=t().finishText;el.again.textContent=t().again;document.querySelectorAll("[data-lang]").forEach(b=>b.setAttribute("aria-pressed",String(b.dataset.lang===lang)))}
function start(){round=0;order=shuffle([...ITEMS]).slice(0,TOTAL);el.finish.classList.remove("show");el.game.hidden=false;showRound()}
function showRound(){locked=false;el.feedback.textContent="";const target=order[round];el.progress.textContent=t().progress(round+1,TOTAL);el.shadow.textContent=target.icon;const others=shuffle(ITEMS.filter(x=>x!==target)).slice(0,2);el.choices.replaceChildren(...shuffle([target,...others]).map(item=>{const b=document.createElement("button");b.type="button";b.className="choice";b.textContent=item.icon;b.setAttribute("aria-label",item.name[li()]);b.onclick=()=>choose(b,item,target);return b}))}
function choose(button,item,target){if(locked)return;if(item===target){locked=true;button.classList.add("correct");el.feedback.textContent=t().right;speak(`${t().right} ${target.name[li()]}`);setTimeout(()=>{round++;if(round<TOTAL)showRound();else complete()},650)}else{button.classList.remove("wrong");void button.offsetWidth;button.classList.add("wrong");el.feedback.textContent=t().wrong;speak(t().wrong)}}
function complete(){el.game.hidden=true;el.finish.classList.add("show");el.progress.textContent=`${TOTAL} / ${TOTAL}`;speak(`${t().finish} ${t().finishText}`)}
el.speak.onclick=()=>speak(t().instruction);el.again.onclick=start;el.language.onclick=e=>{const b=e.target.closest("[data-lang]");if(!b)return;lang=b.dataset.lang;try{localStorage.setItem("kidsGameLanguage",lang)}catch(_){}const u=new URL(location.href);u.searchParams.set("lang",lang);history.replaceState(null,"",u);applyText();if(!el.game.hidden)showRound()};applyText();start();
</script>
</body>
</html>
