<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我的中文游戏 · Juego de chino para peques</title>
<style>
  :root{
    --paper:#FFF8EF;
    --ink:#4A3728;
    --red:#FF6B6B;
    --sun:#FFC93C;
    --mint:#5FD37A;
    --sky:#54B4F0;
    --grape:#B084E8;
    --cardbg:#FFFFFF;
    --shadow:#E7D8C4;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:"SF Pro Rounded", ui-rounded, "Hiragino Maru Gothic ProN", "Quicksand", system-ui, sans-serif;
    background:
      radial-gradient(120% 80% at 50% -10%, #FFE9CE 0%, var(--paper) 55%);
    color:var(--ink);
    height:100dvh; overflow:hidden;
    display:flex; flex-direction:column;
    user-select:none; -webkit-user-select:none;
  }

  /* ---- top bar: the panda + the word being asked ---- */
  .stage{
    flex:0 0 auto;
    display:flex; flex-direction:column; align-items:center;
    padding:max(18px, 3vh) 16px 8px;
    text-align:center;
  }
  .panda{
    font-size:clamp(64px, 16vh, 130px);
    line-height:1;
    transition:transform .25s cubic-bezier(.34,1.56,.64,1);
    cursor:pointer;
  }
  .panda.cheer{ animation:cheer .6s ease; }
  @keyframes cheer{
    0%{transform:scale(1) rotate(0)}
    30%{transform:scale(1.25) rotate(-8deg)}
    60%{transform:scale(1.25) rotate(8deg)}
    100%{transform:scale(1) rotate(0)}
  }
  .panda.sad{ animation:sad .5s ease; }
  @keyframes sad{
    0%,100%{transform:rotate(0)}
    25%{transform:rotate(-6deg)} 75%{transform:rotate(6deg)}
  }

  .prompt{
    margin-top:6px;
    display:flex; flex-direction:column; align-items:center; gap:2px;
  }
  .hanzi{ font-size:clamp(44px, 9vh, 88px); font-weight:800; letter-spacing:2px;}
  .pinyin{ font-size:clamp(18px, 3vh, 26px); color:#9A876F; font-weight:600;}

  .speaker{
    margin-top:10px;
    width:clamp(74px, 12vh, 104px); height:clamp(74px, 12vh, 104px);
    border:none; border-radius:50%;
    background:var(--sun);
    box-shadow:0 8px 0 #E0A82B;
    font-size:clamp(34px, 6vh, 48px);
    cursor:pointer; color:#7A5A12;
    transition:transform .08s, box-shadow .08s;
  }
  .speaker:active{ transform:translateY(6px); box-shadow:0 2px 0 #E0A82B;}

  /* ---- the three picture cards ---- */
  .cards{
    flex:1 1 auto;
    display:grid; grid-template-columns:repeat(3, 1fr);
    gap:clamp(10px, 2.4vw, 24px);
    padding:clamp(12px,2.5vh,22px) clamp(14px,4vw,40px) clamp(20px,4vh,40px);
    align-content:center;
  }
  .card{
    background:var(--cardbg);
    border-radius:28px;
    border:none;
    box-shadow:0 10px 0 var(--shadow);
    aspect-ratio:1/1;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; overflow:hidden; position:relative;
    transition:transform .12s, box-shadow .12s;
  }
  .card:active{ transform:translateY(7px); box-shadow:0 3px 0 var(--shadow);}
  .card .emoji{ font-size:clamp(54px, 15vh, 130px); line-height:1;}
  .card .swatchdot{ width:62%; height:62%; border-radius:50%; border:4px solid rgba(74,55,40,.16);}
  .card .pic{ width:66%; height:66%; display:flex; align-items:center; justify-content:center;}
  .card .pic svg{ width:100%; height:100%;}
  .card.swatch{ }
  .card .dots{
    display:flex; flex-wrap:wrap; gap:8%; justify-content:center; align-items:center;
    width:78%; height:78%;
  }
  .card .dots span{ font-size:clamp(20px,5vh,46px); line-height:1;}
  .card.correct{ animation:pop .5s ease; box-shadow:0 0 0 6px var(--mint), 0 10px 0 var(--shadow);}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}
  .card.wrong{ animation:wobble .45s ease;}
  @keyframes wobble{0%,100%{transform:translateX(0)}20%{transform:translateX(-12px)}40%{transform:translateX(12px)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)}}

  /* ---- start / category screen ---- */
  .screen{
    position:fixed; inset:0; z-index:30;
    background:
      radial-gradient(120% 80% at 50% -10%, #FFE9CE 0%, var(--paper) 60%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; padding:24px; text-align:center;
    transition:opacity .35s; 
  }
  .screen.hide{ opacity:0; pointer-events:none;}
  .hero{ font-size:clamp(58px,13vh,116px); font-weight:800; color:var(--red); letter-spacing:6px; animation:float 3s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
  .title{ font-size:clamp(26px,5vh,40px); font-weight:800; margin:0;}
  .subtitle{ font-size:clamp(15px,2.4vh,20px); color:#9A876F; margin:0 0 6px; font-weight:600;}
  .cats{ display:grid; grid-template-columns:repeat(2,minmax(130px,1fr)); gap:14px; width:min(440px,90vw);}
  .cat{
    border:none; border-radius:24px; padding:20px 10px;
    font-family:inherit; font-weight:800; cursor:pointer;
    font-size:clamp(17px,2.6vh,22px); color:#fff;
    display:flex; flex-direction:column; align-items:center; gap:6px;
    transition:transform .12s, filter .12s;
    box-shadow:0 8px 0 rgba(0,0,0,.12);
  }
  .cat:active{ transform:translateY(5px); box-shadow:0 3px 0 rgba(0,0,0,.12);}
  .cat .cemoji{ font-size:36px;}
  .cat .csub{ font-size:13px; font-weight:600; opacity:.85;}
  .cat.animals{background:var(--mint);} .cat.colors{background:var(--grape);}
  .cat.numbers{background:var(--sky);} .cat.food{background:var(--red);}
  .cat.fruit{background:#FF8FB1;} .cat.body{background:#4EC8C0;}
  .cat.all{background:var(--sun); color:#7A5A12; grid-column:1/3;}

  /* progress stars */
  .stars{ position:fixed; top:12px; left:0; right:0; text-align:center; font-size:22px; letter-spacing:2px; z-index:5; pointer-events:none;}
  .home{
    position:fixed; top:10px; left:12px; z-index:6;
    border:none; background:#fff; box-shadow:0 4px 0 var(--shadow);
    border-radius:50%; width:48px; height:48px; font-size:22px; cursor:pointer;
  }
  .home:active{ transform:translateY(3px); box-shadow:0 1px 0 var(--shadow);}

  /* confetti */
  .confetti{position:fixed; inset:0; pointer-events:none; z-index:20; overflow:hidden;}
  .confetti i{position:absolute; top:-20px; width:12px; height:12px; border-radius:3px; animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg); opacity:.9;}}

  .hint{position:fixed; bottom:6px; left:0; right:0; text-align:center; font-size:12px; color:#C4B49C; z-index:4;}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;}
  }
</style>
</head>
<body>

  <!-- START SCREEN -->
  <div class="screen" id="startScreen">
    <div class="hero">你好</div>
    <h1 class="title">我的中文游戏</h1>
    <p class="subtitle">Escucha y toca · primeras palabras en chino</p>
    <div class="cats" id="cats">
      <button class="cat animals" data-cat="animals"><span class="cemoji">🐰</span>动物<span class="csub">Animales</span></button>
      <button class="cat colors" data-cat="colors"><span class="cemoji">🎨</span>颜色<span class="csub">Colores</span></button>
      <button class="cat numbers" data-cat="numbers"><span class="cemoji">🔢</span>数字<span class="csub">Números</span></button>
      <button class="cat food" data-cat="food"><span class="cemoji">🍗</span>食物<span class="csub">Comida</span></button>
      <button class="cat fruit" data-cat="fruit"><span class="cemoji">🍓</span>水果<span class="csub">Fruta</span></button>
      <button class="cat body" data-cat="body"><span class="cemoji">🖐️</span>身体<span class="csub">Cuerpo</span></button>
      <button class="cat all" data-cat="all"><span class="cemoji">✨</span>Todo mezclado</button>
    </div>
  </div>

  <!-- GAME -->
  <button class="home" id="homeBtn" style="display:none" aria-label="Volver al inicio">🏠</button>
  <div class="stars" id="stars"></div>

  <div class="stage">
    <div class="prompt">
      <div class="hanzi" id="hanzi"></div>
      <div class="pinyin" id="pinyin"></div>
    </div>
    <button class="speaker" id="speaker" aria-label="Repetir sonido">🔊</button>
  </div>

  <div class="cards" id="cards"></div>

  <div class="confetti" id="confetti"></div>
  <div class="hint">Sube el volumen del Mac 🔈 · El panda habla en chino</div>

<script>
/* ---------- vocabulary ---------- */
const DATA = {
  animals: [
    {hz:"猫", py:"māo", emoji:"🐱"},
    {hz:"狗", py:"gǒu", emoji:"🐶"},
    {hz:"鱼", py:"yú",  emoji:"🐟"},
    {hz:"鸟", py:"niǎo",emoji:"🐦"},
    {hz:"兔子",py:"tùzi",emoji:"🐰"},
    {hz:"熊猫",py:"xióngmāo",emoji:"🐼"},
  ],
  colors: [
    {hz:"红色", py:"hóngsè", color:"#FF5B5B"},
    {hz:"黄色", py:"huángsè",color:"#FFD23C"},
    {hz:"蓝色", py:"lánsè",  color:"#3FA9F5"},
    {hz:"绿色", py:"lǜsè",   color:"#4BD16A"},
    {hz:"紫色", py:"zǐsè",   color:"#B084E8"},
    {hz:"橙色", py:"chéngsè",color:"#FF9F40"},
    {hz:"黑色", py:"hēisè",  color:"#2B2B2B"},
    {hz:"白色", py:"báisè",  color:"#FFFFFF"},
    {hz:"粉色", py:"fěnsè",  color:"#FF9EC4"},
  ],
  numbers: [
    {hz:"一", py:"yī",  n:1},
    {hz:"二", py:"èr",  n:2},
    {hz:"三", py:"sān", n:3},
    {hz:"四", py:"sì",  n:4},
    {hz:"五", py:"wǔ",  n:5},
    {hz:"六", py:"liù", n:6},
    {hz:"七", py:"qī",  n:7},
    {hz:"八", py:"bā",  n:8},
    {hz:"九", py:"jiǔ", n:9},
    {hz:"十", py:"shí", n:10},
  ],
  food: [
    {hz:"米饭", py:"mǐfàn",   emoji:"🍚"},
    {hz:"鸡蛋", py:"jīdàn",   emoji:"🥚"},
    {hz:"面条", py:"miàntiáo",emoji:"🍜"},
    {hz:"牛肉", py:"niúròu",  emoji:"🥩"},
    {hz:"猪肉", py:"zhūròu",  emoji:"🥓"},
    {hz:"鸡肉", py:"jīròu",   emoji:"🍗"},
  ],
  fruit: [
    {hz:"苹果", py:"píngguǒ", emoji:"🍎"},
    {hz:"橙子", py:"chéngzi", emoji:"🍊"},
    {hz:"西瓜", py:"xīguā",   emoji:"🍉"},
    {hz:"香蕉", py:"xiāngjiāo",emoji:"🍌"},
    {hz:"葡萄", py:"pútáo",   emoji:"🍇"},
    {hz:"草莓", py:"cǎoméi",  emoji:"🍓"},
  ],
  body: [
    {hz:"脸",  py:"liǎn",  svg:`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="36" fill="#FFD8B1" stroke="#4A3728" stroke-width="4"/><circle cx="38" cy="45" r="4.5" fill="#4A3728"/><circle cx="62" cy="45" r="4.5" fill="#4A3728"/><path d="M50 50 l-4 9 h8 z" fill="#E8A87C"/><path d="M39 65 Q50 73 61 65" fill="none" stroke="#4A3728" stroke-width="4" stroke-linecap="round"/></svg>`},
    {hz:"手",  py:"shǒu",  svg:`<svg viewBox="0 0 100 100"><g fill="#FFD8B1" stroke="#4A3728" stroke-width="3" stroke-linejoin="round"><rect x="34" y="46" width="33" height="36" rx="11"/><rect x="36" y="22" width="7.5" height="30" rx="3.7"/><rect x="45" y="16" width="7.5" height="36" rx="3.7"/><rect x="54" y="18" width="7.5" height="34" rx="3.7"/><rect x="63" y="24" width="7.5" height="28" rx="3.7"/><rect x="20" y="52" width="7.5" height="22" rx="3.7" transform="rotate(40 24 63)"/></g></svg>`},
    {hz:"脚",  py:"jiǎo",  svg:`<svg viewBox="0 0 100 100"><path d="M38 22 C30 22 28 34 30 48 L32 70 C32 80 40 84 50 84 L66 84 C77 84 82 77 82 70 C82 61 73 57 60 57 L48 57 L46 28 C46 24 42 22 38 22 Z" fill="#FFD8B1" stroke="#4A3728" stroke-width="3" stroke-linejoin="round"/><circle cx="66" cy="64" r="2.6" fill="#E8A87C"/><circle cx="73" cy="68" r="2.2" fill="#E8A87C"/></svg>`},
    {hz:"头",  py:"tóu",   svg:`<svg viewBox="0 0 100 100"><path d="M22 96 Q22 76 50 76 Q78 76 78 96 L78 100 L22 100 Z" fill="#7FB8E0"/><rect x="43" y="64" width="14" height="16" fill="#FFD8B1"/><circle cx="50" cy="44" r="22" fill="#FFD8B1" stroke="#4A3728" stroke-width="3"/><path d="M28 42 Q26 18 50 18 Q74 18 72 42 Q66 30 50 30 Q34 30 28 42 Z" fill="#5B3A29"/><circle cx="43" cy="45" r="2.6" fill="#4A3728"/><circle cx="57" cy="45" r="2.6" fill="#4A3728"/><path d="M44 53 Q50 57 56 53" fill="none" stroke="#4A3728" stroke-width="2.6" stroke-linecap="round"/></svg>`},
    {hz:"膝盖",py:"xīgài", svg:`<svg viewBox="0 0 100 100"><rect x="16" y="30" width="44" height="22" rx="11" fill="#FFD8B1" stroke="#4A3728" stroke-width="3"/><rect x="43" y="44" width="22" height="46" rx="11" fill="#FFD8B1" stroke="#4A3728" stroke-width="3"/><circle cx="54" cy="50" r="12" fill="#FFB6C8" stroke="#4A3728" stroke-width="3"/></svg>`},
    {hz:"眼睛",py:"yǎnjing",svg:`<svg viewBox="0 0 100 100"><g stroke="#4A3728" stroke-width="3"><ellipse cx="31" cy="50" rx="17" ry="12" fill="#fff"/><ellipse cx="69" cy="50" rx="17" ry="12" fill="#fff"/><circle cx="31" cy="50" r="6.5" fill="#4A3728"/><circle cx="69" cy="50" r="6.5" fill="#4A3728"/></g><circle cx="33.5" cy="47.5" r="2" fill="#fff"/><circle cx="71.5" cy="47.5" r="2" fill="#fff"/></svg>`},
    {hz:"鼻子",py:"bízi",   svg:`<svg viewBox="0 0 100 100"><path d="M50 24 C48 40 44 52 38 58 C33 63 36 71 45 71 C48 71 49.5 68.5 50 67 C50.5 68.5 52 71 55 71 C64 71 67 63 62 58 C56 52 52 40 50 24 Z" fill="#FFD8B1" stroke="#4A3728" stroke-width="3" stroke-linejoin="round"/><ellipse cx="44" cy="64" rx="3.2" ry="2.5" fill="#4A3728"/><ellipse cx="56" cy="64" rx="3.2" ry="2.5" fill="#4A3728"/></svg>`},
    {hz:"嘴巴",py:"zuǐba",  svg:`<svg viewBox="0 0 100 100"><path d="M24 46 Q50 36 76 46 Q72 70 50 73 Q28 70 24 46 Z" fill="#B23A52" stroke="#4A3728" stroke-width="3" stroke-linejoin="round"/><path d="M30 47 Q50 43 70 47 L66 55 Q50 52 34 55 Z" fill="#fff"/><path d="M50 73 Q40 69 37 61 Q50 64 63 61 Q60 69 50 73 Z" fill="#E07A8C"/></svg>`},
  ],
};
const PRAISE = ["好棒","太棒了","对了","真厉害"]; // hǎo bàng, tài bàng le, duì le, zhēn lìhai

/* ---------- speech ---------- */
let zhVoice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  zhVoice = vs.find(v=>/zh[-_]CN/i.test(v.lang)) ||
            vs.find(v=>/^zh/i.test(v.lang)) ||
            vs.find(v=>/chinese|中文|普通话|Tingting|Mei-?Jia|Ya-?ling/i.test(v.name)) || null;
}
if ('speechSynthesis' in window){
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
function say(text, rate=0.8){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "zh-CN"; u.rate = rate; u.pitch = 1.1;
  if(zhVoice) u.voice = zhVoice;
  speechSynthesis.speak(u);
}

/* ---------- game state ---------- */
let pool = [], current = null, streak = 0, busy = false;
const $ = id => document.getElementById(id);

/* best streak: persists in the downloaded file; no-op inside the in-app preview */
function loadBest(){ try{ return parseInt(localStorage.getItem('mejorRacha'),10) || 0; }catch(e){ return 0; } }
function saveBest(v){ try{ localStorage.setItem('mejorRacha', String(v)); }catch(e){} }
let best = loadBest();

function updateStreakUI(){
  $('stars').innerHTML = `🔥 <b>${streak}</b> &nbsp;&nbsp; 🏆 <b>${best}</b>`;
}

function startScreen(){
  $('startScreen').classList.remove('hide');
  $('homeBtn').style.display = 'none';
  $('stars').textContent = '';
  speechSynthesis && speechSynthesis.cancel();
}

function startGame(cat){
  pool = cat==='all' ? Object.values(DATA).flat() : DATA[cat].slice();
  streak = 0;
  updateStreakUI();
  $('startScreen').classList.add('hide');
  $('homeBtn').style.display = 'block';
  // first tap unlocks audio on Safari
  say("我们开始吧", 0.85);
  setTimeout(nextRound, 700);
}

function sample(arr,n){
  const c=[...arr]; const out=[];
  while(out.length<n && c.length) out.push(c.splice(Math.floor(Math.random()*c.length),1)[0]);
  return out;
}

function renderCardFace(item){
  if(item.color) return `<div class="swatchdot" style="background:${item.color}"></div>`;
  if(item.svg)   return `<div class="pic">${item.svg}</div>`;
  if(item.n){
    const sz = item.n<=5 ? 'clamp(20px,5vh,44px)' : 'clamp(15px,3.4vh,30px)';
    return `<div class="dots">${Array.from({length:item.n},()=>`<span style="font-size:${sz}">⭐</span>`).join('')}</div>`;
  }
  return `<div class="emoji">${item.emoji}</div>`;
}

function nextRound(){
  busy = false;
  const choices = sample(pool, Math.min(3, pool.length));
  current = choices[Math.floor(Math.random()*choices.length)];
  $('hanzi').textContent = current.hz;
  $('pinyin').textContent = current.py;
  const cards = $('cards');
  cards.innerHTML = '';
  choices.forEach(item=>{
    const b = document.createElement('button');
    b.className = 'card' + (item.color?' swatch':'');
    b.setAttribute('aria-label', `${item.hz} ${item.py}`);
    b.lang = 'zh-CN';
    b.innerHTML = renderCardFace(item);
    b.onclick = ()=>choose(item, b);
    cards.appendChild(b);
  });
  setTimeout(()=>say(current.hz, 0.75), 350);
}

function choose(item, el){
  if(busy) return;
  if(item.hz === current.hz){
    busy = true;
    el.classList.add('correct');
    streak++;
    let record = false;
    if(streak > best){ best = streak; saveBest(best); record = true; }
    updateStreakUI();
    if(record){ burst(); say(PRAISE[Math.floor(Math.random()*PRAISE.length)], 0.9); }
    else { say("对", 0.9); }   // duì = "correcto"
    setTimeout(nextRound, record ? 1600 : 1100);
  } else {
    streak = 0;
    updateStreakUI();
    el.classList.add('wrong');
    setTimeout(()=>{ el.classList.remove('wrong'); }, 500);
    setTimeout(()=>say(current.hz, 0.7), 250);
  }
}

/* ---------- confetti ---------- */
function burst(){
  const box = $('confetti');
  const colors = ['#FF6B6B','#FFC93C','#5FD37A','#54B4F0','#B084E8'];
  for(let i=0;i<26;i++){
    const c=document.createElement('i');
    c.style.left = Math.random()*100+'vw';
    c.style.background = colors[i%colors.length];
    c.style.animationDuration = (1+Math.random()*0.8)+'s';
    c.style.animationDelay = (Math.random()*0.2)+'s';
    box.appendChild(c);
    setTimeout(()=>c.remove(), 2200);
  }
}

/* ---------- wiring ---------- */
$('cats').addEventListener('click', e=>{
  const b = e.target.closest('.cat'); if(!b) return;
  startGame(b.dataset.cat);
});
$('speaker').onclick = ()=>{ if(current) say(current.hz, 0.7); };
$('homeBtn').onclick = startScreen;
</script>

<style id="kids-i18n-style">
.kids-lang-switch{position:fixed;z-index:1000;right:max(8px,env(safe-area-inset-right));bottom:max(8px,env(safe-area-inset-bottom));display:flex;gap:3px;padding:4px;background:rgba(255,255,255,.94);border:2px solid rgba(80,70,60,.12);border-radius:18px;box-shadow:0 4px 12px rgba(50,40,30,.18);font-family:ui-rounded,"SF Pro Rounded",system-ui,sans-serif}
.kids-lang-switch button{min-width:37px;min-height:34px;padding:3px 6px;border:0;border-radius:13px;background:transparent;color:#51463e;font:800 13px/1 system-ui,sans-serif;box-shadow:none;transform:none}
.kids-lang-switch button[aria-pressed="true"]{background:#54b4f0;color:#fff}
.kids-lang-zh .cat .sub,.kids-lang-zh .cat .csub{display:none}
@media(max-height:620px){.kids-lang-switch{transform:scale(.82);transform-origin:bottom right}}
</style>

function translateAttributes(element){for(const a of ['aria-label','title','placeholder'])if(element.hasAttribute(a)){const v=tx(element.getAttribute(a));if(v!==element.getAttribute(a))element.setAttribute(a,v)}}
function translateNode(node){if(node.nodeType===3){if(!/^(SCRIPT|STYLE)$/.test(node.parentElement?.tagName||'')){const v=tx(node.nodeValue);if(v!==node.nodeValue)node.nodeValue=v}}else if(node.nodeType===1){translateAttributes(node);node.querySelectorAll?.('*').forEach(translateAttributes);const w=document.createTreeWalker(node,NodeFilter.SHOW_TEXT);while(w.nextNode())translateNode(w.currentNode)}}
if(lang!=='es'){document.title=tx(document.title);translateNode(document.body);}
function syncInactiveScreens(){document.querySelectorAll('[data-kids-inactive]').forEach(el=>{if(!el.matches('.screen.hide,.screen.hidden,.overlay.hide,.overlay.hidden')){el.inert=false;el.removeAttribute('aria-hidden');delete el.dataset.kidsInactive}});document.querySelectorAll('.screen.hide,.screen.hidden,.overlay.hide,.overlay.hidden').forEach(el=>{el.inert=true;el.setAttribute('aria-hidden','true');el.dataset.kidsInactive='true'})}
syncInactiveScreens();new MutationObserver(syncInactiveScreens).observe(document.body,{subtree:true,attributes:true,attributeFilter:['class']});
const observer=new MutationObserver(list=>{if(lang==='es')return;for(const change of list){if(change.type==='characterData')translateNode(change.target);else if(change.type==='attributes')translateNode(change.target);else change.addedNodes.forEach(translateNode)}});observer.observe(document.body,{subtree:true,childList:true,characterData:true,attributes:true,attributeFilter:['aria-label','title','placeholder']});
function wrap(name){const base=window[name];if(typeof base==='function'&&!base.__translated){const fn=function(text,...rest){return base(tx(text),...rest)};fn.__translated=true;window[name]=fn}}
wrap('speak');wrap('safeSpeak');
const box=document.createElement('div');box.className='kids-lang-switch';box.setAttribute('aria-label',lang==='es'?'Idioma':lang==='en'?'Language':'语言');[['es','ES'],['en','EN'],['zh','中文']].forEach(([code,label])=>{const b=document.createElement('button');b.type='button';b.textContent=label;b.setAttribute('aria-pressed',String(code===lang));b.setAttribute('aria-label',code==='es'?'Español':code==='en'?'English':'中文');b.onclick=()=>{try{localStorage.setItem('kidsGameLanguage',code)}catch(_){}const url=new URL(location.href);url.searchParams.set('lang',code);location.href=url.href};box.appendChild(b)});document.body.appendChild(box);
})();
